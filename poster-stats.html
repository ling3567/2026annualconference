<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿統計分析 | TSMCSD 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--primary:#1565C0;--primary-dark:#0d47a1;--primary-light:#e3f2fd;--success:#2e7d32;--success-light:#e8f5e9;--warning:#e65100;--warning-light:#fff3e0;--danger:#c62828;--purple:#6a1b9a;--font:'Noto Sans TC','Microsoft JhengHei',sans-serif;--radius:10px;--shadow:0 2px 10px rgba(0,0,0,0.10);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#f0f4f8;color:#1a1a2e;line-height:1.6;min-height:100vh;}

#app{display:block;}

.header{background:linear-gradient(135deg,#0d47a1,#1976d2);color:white;padding:1.25rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.75rem;}
.header h1{font-size:1.15rem;font-weight:900;}
.header p{font-size:0.8rem;opacity:0.8;}
.setup-bar{background:white;padding:0.75rem 1.5rem;border-bottom:1px solid #e0e0e0;display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;}
.setup-bar input{flex:1;min-width:280px;padding:0.5rem 0.85rem;border:1.5px solid #ccc;border-radius:8px;font-size:0.88rem;font-family:var(--font);}
.setup-bar input:focus{outline:none;border-color:var(--primary);}
.btn{padding:0.5rem 1.1rem;border:none;border-radius:8px;font-size:0.85rem;font-weight:700;font-family:var(--font);cursor:pointer;transition:filter 0.15s;}
.btn:hover{filter:brightness(1.08);}
.btn-primary{background:var(--primary);color:white;}
.main{max-width:1100px;margin:1.25rem auto;padding:0 1rem 3rem;}
.info-bar{padding:0.65rem 1rem;border-radius:8px;font-size:0.85rem;margin-bottom:1rem;display:none;}
.info-bar.show{display:block;}
.info-bar.info{background:var(--primary-light);color:var(--primary);border-left:4px solid var(--primary);}
.info-bar.success{background:var(--success-light);color:var(--success);border-left:4px solid var(--success);}
.info-bar.error{background:#ffebee;color:var(--danger);border-left:4px solid var(--danger);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0.75rem;margin-bottom:1.25rem;}
.stat-card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem;text-align:center;}
.stat-num{font-size:1.9rem;font-weight:900;line-height:1.2;}
.stat-label{font-size:0.78rem;color:#666;margin-top:0.2rem;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;}
@media(max-width:680px){.chart-grid{grid-template-columns:1fr;}}
.chart-box{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:1.25rem;}
.chart-box h3{font-size:0.92rem;color:var(--primary);margin-bottom:0.75rem;}
canvas{max-height:250px;}
.card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:1.25rem;overflow:hidden;}
.card-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;padding:0.9rem 1.25rem;border-bottom:2px solid var(--primary-light);background:#fafbff;}
.card-header h2{font-size:0.95rem;color:var(--primary);}
.search-bar{padding:0.4rem 0.75rem;border:1.5px solid #ccc;border-radius:8px;font-size:0.85rem;font-family:var(--font);}
.search-bar:focus{outline:none;border-color:var(--primary);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.85rem;}
thead th{background:var(--primary);color:white;padding:0.5rem 0.75rem;text-align:left;font-weight:700;}
tbody tr{border-bottom:1px solid #eee;transition:background 0.1s;}
tbody tr:hover{background:#f5f8ff;}
td{padding:0.55rem 0.75rem;vertical-align:middle;}
.badge{display:inline-block;padding:0.15rem 0.55rem;border-radius:12px;font-size:0.75rem;font-weight:700;}
.badge-a{background:#e3f2fd;color:#1565c0;}
.badge-b{background:#f3e5f5;color:#6a1b9a;}
.badge-c{background:#e8f5e9;color:#2e7d32;}
.badge-paid{background:#e8f5e9;color:#2e7d32;}
.badge-pending{background:#fff3e0;color:#e65100;}
.badge-none{background:#ffebee;color:#c62828;}
.updated-at{font-size:0.75rem;color:rgba(255,255,255,0.7);}
</style>
</head>
<body>

<div id="app" class="show">
  <div class="header">
    <div>
      <h1>📊 投稿統計分析</h1>
      <p>台灣醫事聯合臨床技能發展學會 2026年會員大會暨學術研討會</p>
    </div>
    <div class="updated-at" id="updatedAt"></div>
  </div>
  <div class="setup-bar">
    <input type="text" id="scriptUrl" placeholder="Apps Script URL"
      value="https://script.google.com/macros/s/AKfycbzdppunk_BTiZN2ShWpJilr5FGnCrN4BB6QPD_miImF5pObEZxe3wSAQaj5VuWbnF3m/exec">
    <button class="btn btn-primary" onclick="loadData()">🔄 更新資料</button>
  </div>
  <div class="main">
    <div class="info-bar" id="infoBar"></div>
    <!-- 數字總覽 -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="s-total" style="color:var(--primary)">—</div><div class="stat-label">總投稿篇數</div></div>
      <div class="stat-card"><div class="stat-num" id="s-a" style="color:#1565c0">—</div><div class="stat-label">A 類</div></div>
      <div class="stat-card"><div class="stat-num" id="s-b" style="color:#6a1b9a">—</div><div class="stat-label">B 類</div></div>
      <div class="stat-card"><div class="stat-num" id="s-c" style="color:#2e7d32">—</div><div class="stat-label">C 類</div></div>
      <div class="stat-card"><div class="stat-num" id="s-paid" style="color:var(--success)">—</div><div class="stat-label">會員已繳費</div></div>
      <div class="stat-card"><div class="stat-num" id="s-pending" style="color:var(--warning)">—</div><div class="stat-label">會員未繳費</div></div>
      <div class="stat-card"><div class="stat-num" id="s-none" style="color:var(--danger)">—</div><div class="stat-label">非會員</div></div>
      <div class="stat-card"><div class="stat-num" id="s-hosp" style="color:var(--purple)">—</div><div class="stat-label">投稿機構數</div></div>
    </div>
    <!-- 圖表 -->
    <div class="chart-grid">
      <div class="chart-box"><h3>📊 投稿類別分佈</h3><canvas id="catChart"></canvas></div>
      <div class="chart-box"><h3>💰 會員繳費狀態</h3><canvas id="paidChart"></canvas></div>
      <div class="chart-box"><h3>👤 職類分佈（前10）</h3><canvas id="profChart"></canvas></div>
      <div class="chart-box"><h3>🏥 醫院投稿排名（前10）</h3><canvas id="hospChart"></canvas></div>
    </div>
    <!-- 醫院明細 -->
    <div class="card">
      <div class="card-header">
        <h2>🏥 醫院投稿統計明細</h2>
        <input type="text" class="search-bar" id="hospSearch" placeholder="搜尋醫院..." oninput="filterHosp()">
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>醫院／機構</th><th style="text-align:center">篇數</th><th>A類</th><th>B類</th><th>C類</th></tr></thead>
          <tbody id="hospBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
let submissions = [];
let hospData = [];
let catC = null, paidC = null, profC = null, hospC = null;

// 頁面載入後自動載入資料
window.addEventListener('DOMContentLoaded', () => loadData());

function showInfo(msg,type){const b=document.getElementById('infoBar');b.textContent=msg;b.className='info-bar show '+(type||'info');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function loadData(){
  const url = document.getElementById('scriptUrl').value.trim();
  showInfo('⏳ 載入中...','info');
  try{
    const resp = await fetch(url+'?action=getSubmissions');
    const json = await resp.json();
    if(json.result!=='success') throw new Error(json.message);
    submissions = json.data;
    renderAll();
    document.getElementById('updatedAt').textContent = '最後更新：'+new Date().toLocaleTimeString('zh-TW');
    showInfo(`✅ 已載入 ${submissions.length} 筆投稿`,'success');
  }catch(e){showInfo('❌ 載入失敗：'+e.message,'error');}
}

function renderAll(){
  const n=submissions.length;
  const cats={A:0,B:0,C:0};
  const paid={paid:0,pending:0,none:0};
  const prof={};
  const hosp={};

  submissions.forEach(r=>{
    const c=(r[2]||'').replace('類','').trim();
    if(cats[c]!==undefined) cats[c]++;
    const m=r[7]||'';
    if(m.includes('已繳'))paid.paid++;
    else if(m.includes('未繳'))paid.pending++;
    else paid.none++;
    if(r[14]) prof[r[14]]=(prof[r[14]]||0)+1;
    const u=(r[11]||'').split(/[\n,，]/)[0].trim();
    if(u) hosp[u]=(hosp[u]||0)+1;
  });



  document.getElementById('s-total').textContent=n;
  document.getElementById('s-a').textContent=cats.A;
  document.getElementById('s-b').textContent=cats.B;
  document.getElementById('s-c').textContent=cats.C;
  document.getElementById('s-paid').textContent=paid.paid;
  document.getElementById('s-pending').textContent=paid.pending;
  document.getElementById('s-none').textContent=paid.none;
  document.getElementById('s-hosp').textContent=Object.keys(hosp).length;

  if(catC) catC.destroy();
  catC=new Chart(document.getElementById('catChart'),{type:'doughnut',data:{labels:['A類','B類','C類'],datasets:[{data:[cats.A,cats.B,cats.C],backgroundColor:['#1565c0','#6a1b9a','#2e7d32'],borderWidth:2}]},options:{plugins:{legend:{position:'bottom'}},responsive:true,maintainAspectRatio:true}});

  if(paidC) paidC.destroy();
  paidC=new Chart(document.getElementById('paidChart'),{type:'doughnut',data:{labels:['已繳費','未繳費','非會員'],datasets:[{data:[paid.paid,paid.pending,paid.none],backgroundColor:['#2e7d32','#e65100','#c62828'],borderWidth:2}]},options:{plugins:{legend:{position:'bottom'}},responsive:true,maintainAspectRatio:true}});

  const sp=Object.entries(prof).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(profC) profC.destroy();
  profC=new Chart(document.getElementById('profChart'),{type:'bar',data:{labels:sp.map(p=>p[0]),datasets:[{label:'篇數',data:sp.map(p=>p[1]),backgroundColor:'#1565c0',borderRadius:4}]},options:{plugins:{legend:{display:false}},responsive:true,maintainAspectRatio:true,scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});

  hospData=Object.entries(hosp).sort((a,b)=>b[1]-a[1]);
  const top10=hospData.slice(0,10);
  if(hospC) hospC.destroy();
  hospC=new Chart(document.getElementById('hospChart'),{type:'bar',data:{labels:top10.map(h=>h[0].length>8?h[0].substring(0,8)+'…':h[0]),datasets:[{label:'篇數',data:top10.map(h=>h[1]),backgroundColor:'#6a1b9a',borderRadius:4}]},options:{plugins:{legend:{display:false}},responsive:true,maintainAspectRatio:true,scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});

  renderHospTable(hospData);
}

// 模糊群組：找出所有名稱中最長的共同關鍵字（至少4字），合併計算
function fuzzyGroupHosp(rawMap) {
  const names = Object.keys(rawMap);
  const groups = {}; // 代表名稱 → {count, aliases:[]}

  names.forEach(name => {
    // 找是否已有群組包含此名稱（以4字以上子串比對）
    let matched = null;
    for(const rep of Object.keys(groups)) {
      if(name.includes(rep) || rep.includes(name) || longestCommon(name, rep) >= 4) {
        matched = rep;
        break;
      }
    }
    if(matched) {
      groups[matched].count += rawMap[name];
      groups[matched].aliases.push(name);
      // 若新名稱比代表名稱長，換用較長的作為代表（通常較完整）
      if(name.length > matched.length) {
        groups[name] = {...groups[matched]};
        delete groups[matched];
      }
    } else {
      groups[name] = { count: rawMap[name], aliases: [name] };
    }
  });
  return groups;
}

function longestCommon(a, b) {
  let max = 0;
  for(let i=0; i<a.length; i++) {
    for(let j=0; j<b.length; j++) {
      let len=0;
      while(i+len<a.length && j+len<b.length && a[i+len]===b[j+len]) len++;
      if(len > max) max = len;
    }
  }
  return max;
}

function renderHospTable(data){
  const tbody=document.getElementById('hospBody');
  tbody.innerHTML='';
  Object.entries(data).sort((a,b)=>b[1].count-a[1].count).forEach(([u,info])=>{
    const cnt = info.count;
    const aliases = info.aliases.filter(a=>a!==u);
    const a=submissions.filter(r=>(r[11]||'').includes(u.slice(0,4))&&(r[2]||'').includes('A')).length;
    const b=submissions.filter(r=>(r[11]||'').includes(u.slice(0,4))&&(r[2]||'').includes('B')).length;
    const c=submissions.filter(r=>(r[11]||'').includes(u.slice(0,4))&&(r[2]||'').includes('C')).length;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><strong>${esc(u)}</strong>${aliases.length?`<br><span style="font-size:0.75rem;color:#aaa">亦含：${aliases.map(esc).join('、')}</span>`:''}
      </td>
      <td style="text-align:center;font-weight:700;color:var(--primary);font-size:1.05rem">${cnt}</td>
      <td>${a?`<span class="badge badge-a">${a}</span>`:'-'}</td>
      <td>${b?`<span class="badge badge-b">${b}</span>`:'-'}</td>
      <td>${c?`<span class="badge badge-c">${c}</span>`:'-'}</td>`;
    tbody.appendChild(tr);
  });
}
function filterHosp(){
  if(!submissions.length) return;
  const q=document.getElementById('hospSearch').value.toLowerCase();
  const hospMap={};
  submissions.forEach(r=>{const u=(r[11]||'').split(/[\n,，]/)[0].trim();if(u)hospMap[u]=(hospMap[u]||0)+1;});
  const filtered={};
  if(q) Object.entries(hospMap).forEach(([u,c])=>{if(u.toLowerCase().includes(q))filtered[u]=c;});
  renderHospTable(q?filtered:hospMap);
}
</script>
</body>
</html>
