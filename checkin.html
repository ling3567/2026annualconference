<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年會報到系統 — TSMCSD</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1c1917;
  --primary-dark: #0f0e0c;
  --primary-light: #f0ece7;
  --primary-muted: #a8a099;
  --success: #5a7d5c;
  --success-bg: #eef3ee;
  --warning: #b87a20;
  --warning-bg: #fdf4e4;
  --info: #4a6d8c;
  --info-bg: #edf2f6;
  --accent: #8c5c6e;
  --accent-bg: #f4edf0;
  --terra: #c45a3c;
  --bg: #f7f5f2;
  --card: #ffffff;
  --text: #1c1917;
  --text-secondary: #5c5650;
  --text-muted: #9b9590;
  --border: #e6e2dc;
  --border-light: #f0ece7;
  --shadow-sm: 0 1px 2px rgba(28,25,23,0.04);
  --shadow: 0 2px 8px rgba(28,25,23,0.06);
  --shadow-lg: 0 6px 24px rgba(28,25,23,0.08);
  --radius: 8px;
  --radius-sm: 5px;
  --font: 'Noto Sans TC', -apple-system, 'Segoe UI', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}

/* SVG Icon */
.icon-svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.icon-svg.sm{width:15px;height:15px}
.icon-svg.lg{width:22px;height:22px}
.icon-svg.xl{width:28px;height:28px}

/* ===== HEADER — dark editorial ===== */
.app-header{background:var(--primary);border-bottom:none;padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 12px rgba(0,0,0,0.12)}
.header-left{display:flex;align-items:center;gap:0.6rem}
.header-logo-wrap{width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 0 1px rgba(255,255,255,.2)}
.header-logo{width:26px;height:26px;object-fit:contain}
.header-left h1{font-size:.95rem;font-weight:700;color:#f0ece7;letter-spacing:.06em}
.header-right{display:flex;align-items:center;gap:0.6rem}
.stat-group{display:flex;gap:0.6rem;align-items:center}
.stat-item{display:flex;align-items:center;gap:0.3rem;font-size:0.76rem;color:rgba(240,236,231,.6)}
.stat-item strong{font-size:0.85rem;font-weight:700;color:#f0ece7}
.stat-divider{width:1px;height:14px;background:rgba(255,255,255,.15)}

/* Header buttons */
.header-btn{display:flex;align-items:center;gap:0.3rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(240,236,231,.75);padding:0.3rem 0.65rem;border-radius:var(--radius-sm);font-size:0.74rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;letter-spacing:.02em}
.header-btn:hover{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.25)}
.header-btn.active{background:var(--terra);color:#fff;border-color:var(--terra)}

/* ===== PAGE VIEWS ===== */
.page{display:none}
.page.active{display:block}

/* ===== CHECKIN PAGE: THREE-COLUMN ===== */
.main-layout{display:grid;grid-template-columns:240px 1fr 1.15fr;gap:1px;height:calc(100vh - 54px);background:var(--border);width:100%}
.panel{background:var(--card);display:flex;flex-direction:column;overflow:hidden;min-width:0;width:100%}
.panel-header{padding:.8rem 1.15rem;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:.45rem;flex-shrink:0}
.panel-header h2{font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
.panel-header .panel-icon{color:var(--primary-muted)}
.panel-body{flex:1;overflow-y:auto;padding:.85rem 1.15rem;min-width:0}

/* Left: Search */
.search-box{position:relative;margin-bottom:.75rem}
.search-box .search-icon-wrap{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--text-muted)}
#searchInput{width:100%;padding:.6rem .7rem .6rem 2.2rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.88rem;font-family:var(--font);outline:none;transition:all .15s;background:var(--bg)}
#searchInput:focus{border-color:var(--terra);background:#fff;box-shadow:0 0 0 3px rgba(196,90,60,.08)}
#searchInput::placeholder{color:var(--text-muted)}
.search-hint{font-size:.72rem;color:var(--text-muted);margin-bottom:.6rem;letter-spacing:.01em}
.search-list{display:flex;flex-direction:column;gap:2px}
.search-item{display:flex;align-items:center;gap:.55rem;padding:.5rem .65rem;border-radius:var(--radius-sm);cursor:pointer;transition:all .12s;border:1.5px solid transparent}
.search-item:hover{background:var(--bg)}
.search-item.active{background:var(--primary-light);border-color:var(--border)}
.search-item.is-checked .si-avatar{background:var(--success)}
.si-avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#f0ece7;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.si-avatar.nm{background:var(--text-muted)}
.si-info{min-width:0;flex:1}
.si-name{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-org{font-size:.7rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-check{color:var(--success);flex-shrink:0}

/* Center: Detail */
.detail-empty,.action-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);gap:.5rem;text-align:center;padding:2rem}
.detail-empty p,.action-empty p{font-size:.82rem;letter-spacing:.01em}
.person-profile{display:none;flex-direction:column;height:100%}
.person-profile.visible{display:flex}
.profile-top{display:flex;align-items:center;gap:.85rem;margin-bottom:1.1rem}
.profile-avatar{width:44px;height:44px;border-radius:50%;background:var(--primary);color:#f0ece7;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;flex-shrink:0}
.profile-avatar.nm{background:var(--text-muted)}
.profile-avatar.ck{background:var(--success)}
.profile-name{font-size:1.15rem;font-weight:700;letter-spacing:.02em}
.profile-badges{display:flex;gap:.3rem;margin-top:.25rem;flex-wrap:wrap}
.badge{font-size:.64rem;font-weight:600;padding:.15rem .45rem;border-radius:3px;display:inline-flex;align-items:center;gap:.2rem;letter-spacing:.02em}
.badge-member{background:var(--primary-light);color:var(--text)}
.badge-nonmember{background:#f1efec;color:var(--text-muted)}
.badge-paid{background:var(--success-bg);color:var(--success)}
.badge-unpaid{background:var(--warning-bg);color:var(--warning)}
.badge-poster{background:var(--accent-bg);color:var(--accent)}
.badge-checkedin{background:var(--success-bg);color:var(--success)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.info-label{font-size:.64rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.1rem}
.info-value{font-size:.83rem;font-weight:500}

/* Right: Actions */
.action-content{display:none;flex-direction:column;height:100%;width:100%}
.action-content.visible{display:flex}
.action-list{display:flex;flex-direction:column;gap:.5rem;width:100%}
.action-card{display:flex;align-items:flex-start;gap:.65rem;padding:.75rem .85rem;border-radius:var(--radius);border:1px solid;line-height:1.5;width:100%}
.action-card .ai-wrap{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.action-card .at{font-size:.83rem;flex:1}
.action-card .at strong{font-weight:700}
.action-card .at .as{font-size:.76rem;opacity:.75;margin-top:.1rem}
.action-card.act-default{background:var(--primary-light);border-color:#ddd8d1}
.action-card.act-default .ai-wrap{background:rgba(28,25,23,.08);color:var(--text)}
.action-card.act-success{background:var(--success-bg);border-color:#c5d8c7}
.action-card.act-success .ai-wrap{background:rgba(90,125,92,.1);color:var(--success)}
.action-card.act-warning{background:var(--warning-bg);border-color:#edd9a8}
.action-card.act-warning .ai-wrap{background:rgba(184,122,32,.1);color:var(--warning)}
.action-card.act-info{background:var(--info-bg);border-color:#c8d8e6}
.action-card.act-info .ai-wrap{background:rgba(74,109,140,.1);color:var(--info)}
.action-card.act-accent{background:var(--accent-bg);border-color:#d9cbd2}
.action-card.act-accent .ai-wrap{background:rgba(140,92,110,.1);color:var(--accent)}
.action-card.act-muted{background:#f5f4f3;border-color:#e6e4e1;opacity:.7}
.action-card.act-muted .ai-wrap{background:rgba(0,0,0,.04);color:var(--text-muted)}
.action-card.act-muted .at{color:var(--text-muted)}

.checkin-bar{border-top:1px solid var(--border-light);padding:.85rem 0 0;margin-top:.85rem;flex-shrink:0;display:flex;gap:.5rem;align-items:center;width:100%}
.btn-checkin{flex:1;display:flex;align-items:center;justify-content:center;gap:.4rem;background:var(--terra);color:#fff;border:none;padding:.7rem 1.2rem;border-radius:var(--radius);font-size:.92rem;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;letter-spacing:.02em}
.btn-checkin:hover{background:#a84a30;transform:translateY(-1px);box-shadow:0 4px 12px rgba(196,90,60,.2)}
.btn-checkin:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-checkin.already-done{background:var(--success-bg);color:var(--success);border:1.5px solid #c5d8c7;cursor:default}
.btn-checkin.already-done:hover{transform:none;box-shadow:none}
.btn-undo{display:flex;align-items:center;gap:.25rem;background:transparent;color:var(--text-muted);border:1.5px solid var(--border);padding:.6rem .8rem;border-radius:var(--radius);font-size:.78rem;font-weight:500;font-family:var(--font);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-undo:hover{border-color:var(--terra);color:var(--terra)}

/* Onsite pay buttons */
.btn-onsite{background:var(--terra);color:#fff;border:none;padding:.35rem .7rem;border-radius:var(--radius-sm);font-size:.76rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .15s}
.btn-onsite:hover{background:#a84a30;transform:translateY(-1px)}
.btn-onsite.btn-onsite-alt{background:transparent;color:var(--text-muted);border:1.5px solid var(--border)}
.btn-onsite.btn-onsite-alt:hover{border-color:var(--text-secondary);color:var(--text-secondary)}

/* Log */
.log-section{border-top:1px solid var(--border-light);padding-top:.65rem;margin-top:auto;flex-shrink:0}
.log-title{font-size:.68rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem;display:flex;align-items:center;gap:.3rem}
.log-list{display:flex;flex-direction:column;gap:2px;max-height:110px;overflow-y:auto}
.log-item{font-size:.73rem;padding:.25rem .45rem;background:var(--bg);border-radius:4px;display:flex;justify-content:space-between}
.log-item .ln{font-weight:600}
.log-item .lt{color:var(--text-muted)}

/* ===== STATS PAGE ===== */
.stats-page{display:flex;flex-direction:column;height:calc(100vh - 54px);overflow-y:auto;padding:1.5rem 2.5rem;width:100%}
.stats-page .stats-header{margin-bottom:1.25rem}
.stats-page .stats-header h2{font-size:1.15rem;font-weight:700;color:var(--text);letter-spacing:.02em}
.stats-page .stats-header p{font-size:.82rem;color:var(--text-muted);margin-top:.2rem}

/* Overall bar */
.stats-overall{display:grid;grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));gap:.75rem;margin-bottom:1.5rem}
.so-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.15rem;display:flex;flex-direction:column;gap:.25rem}
.so-card .so-label{font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.so-card .so-val{font-size:1.5rem;font-weight:700;color:var(--text)}
.so-card .so-bar{height:5px;background:var(--border-light);border-radius:3px;overflow:hidden;margin-top:.25rem}
.so-card .so-bar-fill{height:100%;border-radius:3px;transition:width .3s}

/* Group sections */
.stats-tabs{display:flex;gap:4px;margin-bottom:1rem;background:var(--border-light);padding:3px;border-radius:var(--radius)}
.stats-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:.3rem;background:transparent;border:none;padding:.55rem .75rem;border-radius:calc(var(--radius) - 2px);font-size:.8rem;font-weight:600;font-family:var(--font);color:var(--text-muted);cursor:pointer;transition:all .15s;letter-spacing:.02em}
.stats-tab:hover{color:var(--text)}
.stats-tab.active{background:var(--card);color:var(--text);box-shadow:var(--shadow-sm)}
.stat-section{}
.org-search-box{margin-bottom:.75rem}
.stats-group{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.75rem;overflow:hidden}
.sg-header{padding:.85rem 1.15rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .12s}
.sg-header:hover{background:var(--bg)}
.sg-header h3{font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:.4rem;letter-spacing:.01em}
.sg-header .sg-stat{font-size:.78rem;color:var(--text-muted);display:flex;align-items:center;gap:.5rem}
.sg-header .sg-rate{font-weight:700;color:var(--text)}
.sg-body{display:none;border-top:1px solid var(--border-light);padding:.75rem 1.15rem}
.stats-group.expanded .sg-body{display:block}
.sg-member-list{display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:.4rem}
.sg-member{display:flex;align-items:center;gap:.5rem;padding:.4rem .6rem;border-radius:var(--radius-sm);font-size:.82rem}
.sg-member.checked{background:var(--success-bg)}
.sg-member.unchecked{background:var(--bg)}
.sg-member .sg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sg-member.checked .sg-dot{background:var(--success)}
.sg-member.unchecked .sg-dot{background:var(--border)}
.sg-member .sg-mname{font-weight:500}
.sg-member.checked .sg-mname{color:var(--success)}

/* ===== LOADING ===== */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(247,245,242,.92);z-index:200;justify-content:center;align-items:center;flex-direction:column;gap:.75rem}
.loading-overlay.show{display:flex}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--terra);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.82rem;color:var(--text-muted);letter-spacing:.02em}

/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--primary);color:#f0ece7;padding:.55rem 1.1rem;border-radius:var(--radius);font-size:.8rem;font-weight:500;z-index:300;opacity:0;transition:all .25s;white-space:nowrap;box-shadow:0 4px 16px rgba(28,25,23,.2);letter-spacing:.02em}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== RESPONSIVE ===== */

/* Tablet landscape */
@media(max-width:1024px){
  .main-layout{grid-template-columns:200px 1fr 1.1fr}
  .stats-overall{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
}

/* Tablet portrait / small laptop */
@media(max-width:768px){
  /* Header */
  .app-header{padding:0 .6rem;height:auto;min-height:48px;flex-wrap:wrap;gap:.3rem;padding-top:.4rem;padding-bottom:.4rem}
  .header-left h1{font-size:.82rem}
  .header-logo-wrap{width:28px;height:28px}
  .header-logo{width:22px;height:22px}
  .header-right{width:100%;justify-content:space-between}
  .stat-group{gap:.3rem}
  .stat-group .stat-divider{display:none}
  .stat-item{font-size:.68rem}
  .stat-item strong{font-size:.76rem}
  .header-btn{font-size:.7rem;padding:.25rem .5rem}

  /* Three-column → stacked */
  .main-layout{grid-template-columns:1fr;grid-template-rows:auto auto 1fr;height:auto;min-height:calc(100vh - 80px)}
  .panel{border-bottom:1px solid var(--border)}
  .panel-search{max-height:220px}
  .panel-search .panel-body{padding:.6rem .8rem}
  .search-list{flex-direction:row;flex-wrap:wrap;gap:3px}
  .search-item{padding:.35rem .5rem;flex:0 0 auto}

  /* Stats page */
  .stats-page{padding:1rem}
  .stats-overall{grid-template-columns:repeat(2,1fr);gap:.5rem}
  .so-card{padding:.75rem .85rem}
  .stats-tabs{flex-direction:row}
  .sg-member-list{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}

/* Mobile */
@media(max-width:480px){
  /* Header: hide stats, minimal buttons */
  .stat-group{display:none}
  .app-header{min-height:44px}
  .header-right{justify-content:flex-end;gap:.35rem}
  .header-btn svg{display:none}
  .header-btn{font-size:.68rem;padding:.25rem .45rem}

  /* Panels */
  .panel-search{max-height:180px}
  .panel-header{padding:.6rem .8rem}
  .panel-header h2{font-size:.68rem}
  .panel-body{padding:.6rem .8rem}

  /* Info & cards */
  .info-grid{grid-template-columns:1fr}
  .profile-top{gap:.6rem}
  .profile-avatar{width:36px;height:36px;font-size:.9rem}
  .profile-name{font-size:1rem}
  .action-card{padding:.6rem .7rem;gap:.5rem}
  .action-card .ai-wrap{width:26px;height:26px;border-radius:5px}
  .action-card .at{font-size:.8rem}
  .btn-checkin{font-size:.85rem;padding:.6rem 1rem}
  .btn-onsite{font-size:.72rem;padding:.3rem .55rem}

  /* Stats page */
  .stats-page{padding:.75rem}
  .stats-overall{grid-template-columns:1fr;gap:.4rem}
  .so-card .so-val{font-size:1.2rem}
  .stats-tabs .stats-tab{font-size:.74rem;padding:.45rem .5rem}
  #fieldSelect{font-size:.8rem;min-width:100px}
  .sg-member-list{grid-template-columns:1fr}
  .sg-header h3{font-size:.82rem}
  .sg-header .sg-stat{font-size:.72rem}

  /* Log */
  .log-list{max-height:80px}
  .log-item{font-size:.7rem}

  /* Toast */
  .toast{font-size:.75rem;padding:.45rem .85rem}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-left">
    <div class="header-logo-wrap">
      <img class="header-logo" src="https://raw.githubusercontent.com/ling3567/2026annualconference/main/images/TSMCSD-logo.png" alt="TSMCSD">
    </div>
    <h1>2026年會報到系統</h1>
  </div>
  <div class="header-right">
    <div class="stat-group">
      <div class="stat-item">報名 <strong id="statTotal">-</strong></div>
      <div class="stat-divider"></div>
      <div class="stat-item">已報到 <strong id="statChecked">-</strong></div>
      <div class="stat-divider"></div>
      <div class="stat-item">報到率 <strong id="statRate">-</strong></div>
    </div>
    <button class="header-btn active" id="btnPageCheckin" onclick="switchPage('checkin')">
      <svg class="icon-svg sm" viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
      報到
    </button>
    <button class="header-btn" id="btnPageStats" onclick="switchPage('stats')">
      <svg class="icon-svg sm" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      報到統計
    </button>
    <button class="header-btn" onclick="refreshData()">
      <svg class="icon-svg sm" viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      重新整理
    </button>
  </div>
</header>

<!-- PAGE: CHECKIN -->
<div class="page active" id="pageCheckin">
<div class="main-layout">
  <!-- LEFT -->
  <div class="panel panel-search">
    <div class="panel-header">
      <svg class="icon-svg sm panel-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      <h2>搜尋報名人員</h2>
    </div>
    <div class="panel-body">
      <div class="search-box">
        <div class="search-icon-wrap"><svg class="icon-svg sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg></div>
        <input type="text" id="searchInput" placeholder="姓名或服務單位…" autocomplete="off" autofocus>
      </div>
      <div class="search-hint" id="searchHint">載入中…</div>
      <div class="search-list" id="searchList"></div>
    </div>
  </div>
  <!-- CENTER -->
  <div class="panel panel-detail">
    <div class="panel-header">
      <svg class="icon-svg sm panel-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
      <h2>學員資料</h2>
    </div>
    <div class="panel-body">
      <div class="detail-empty" id="detailEmpty">
        <svg class="icon-svg xl" viewBox="0 0 24 24" style="opacity:.25"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
        <p>從左側搜尋選取人員</p>
      </div>
      <div class="person-profile" id="personProfile">
        <div class="profile-top">
          <div class="profile-avatar" id="profileAvatar"></div>
          <div><div class="profile-name" id="profileName"></div><div class="profile-badges" id="profileBadges"></div></div>
        </div>
        <div class="info-grid" id="infoGrid"></div>
      </div>
    </div>
  </div>
  <!-- RIGHT -->
  <div class="panel panel-action">
    <div class="panel-header">
      <svg class="icon-svg sm panel-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M12 8v8"/></svg>
      <h2>報到處理事項</h2>
    </div>
    <div class="panel-body" style="display:flex;flex-direction:column">
      <div class="action-empty" id="actionEmpty">
        <svg class="icon-svg xl" viewBox="0 0 24 24" style="opacity:.25"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
        <p>選取人員後顯示處理事項</p>
      </div>
      <div class="action-content" id="actionContent">
        <div class="action-list" id="actionList"></div>
        <div class="checkin-bar" id="checkinBar"></div>
        <div class="log-section" id="logSection" style="display:none">
          <div class="log-title">
            <svg class="icon-svg sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            最近報到紀錄
          </div>
          <div class="log-list" id="logList"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- PAGE: STATS -->
<div class="page" id="pageStats">
<div class="stats-page">
  <div class="stats-header">
    <h2>報到統計</h2>
    <p>即時報到狀況一覽</p>
  </div>
  <div class="stats-overall" id="statsOverall"></div>

  <!-- Tab switch: 身分群組 / 報名資料分析 -->
  <div class="stats-tabs">
    <button class="stats-tab active" onclick="switchStatTab('groups',this)">
      <svg class="icon-svg sm" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      身分群組
    </button>
    <button class="stats-tab" onclick="switchStatTab('fields',this)">
      <svg class="icon-svg sm" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v3"/></svg>
      報名資料分析
    </button>
  </div>

  <!-- 身分群組 -->
  <div class="stat-section" id="sectionGroups">
    <div style="display:flex;gap:.6rem;align-items:center;margin-bottom:.75rem;flex-wrap:wrap">
      <label style="font-size:.78rem;font-weight:600;color:var(--text-muted)">選擇群組：</label>
      <select id="groupSelect" onchange="renderGroupStats()" style="padding:.4rem .7rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.85rem;font-family:var(--font);background:var(--card);color:var(--text);outline:none;cursor:pointer;min-width:160px">
        <option value="__all__">全部群組</option>
      </select>
    </div>
    <div id="statsGroups"></div>
  </div>

  <!-- 報名資料分析 -->
  <div class="stat-section" id="sectionFields" style="display:none">
    <div style="display:flex;gap:.6rem;align-items:center;margin-bottom:.75rem;flex-wrap:wrap">
      <label style="font-size:.78rem;font-weight:600;color:var(--text-muted)">依欄位分組：</label>
      <select id="fieldSelect" onchange="renderFieldStats()" style="padding:.4rem .7rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.85rem;font-family:var(--font);background:var(--card);color:var(--text);outline:none;cursor:pointer;min-width:140px">
        <option value="org">服務單位</option>
        <option value="profession">職類</option>
      </select>
      <div class="search-box" style="flex:1;min-width:160px;margin:0">
        <div class="search-icon-wrap"><svg class="icon-svg sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg></div>
        <input type="text" id="fieldSearchInput" placeholder="搜尋…" autocomplete="off" oninput="renderFieldStats()" style="width:100%;padding:.45rem .7rem .45rem 2.2rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.85rem;font-family:var(--font);outline:none;background:var(--bg)">
      </div>
    </div>
    <div class="search-hint" id="fieldSearchHint" style="margin-bottom:.5rem"></div>
    <div id="statsFields"></div>
  </div>
</div>
</div>

<!-- LOADING -->
<div class="loading-overlay show" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">載入報名資料中…</div>
</div>
<div class="toast" id="toast"></div>

<script>
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbzuUFvNb6xlXSkZuLVGmDMhOxQfXHQDFzYVymg2jgTByy028Me4WgKELudNjt7TmGoYiA/exec'
};

// SVG icons
const I = {
  badge:   '<svg class="icon-svg" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 10h20"/><circle cx="8" cy="15" r="2"/><path d="M14 14h4M14 17h3"/></svg>',
  gift:    '<svg class="icon-svg" viewBox="0 0 24 24"><rect x="3" y="10" width="18" height="11" rx="2"/><path d="M12 10v11M3 14h18"/><path d="M7.5 10C6 10 5 8.5 5 7.5S6 5 7.5 5c1.1 0 3 1.5 4.5 5"/><path d="M16.5 10c1.5 0 2.5-1.5 2.5-2.5S18 5 16.5 5c-1.1 0-3 1.5-4.5 5"/></svg>',
  meal:    '<svg class="icon-svg" viewBox="0 0 24 24"><path d="M3 2v7a5 5 0 0 0 5 5v8M3 9h4M21 15c0-4.5-2-9-6-9v18"/></svg>',
  dollar:  '<svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v12"/><path d="M16 9.5c0-1.38-1.79-2.5-4-2.5s-4 1.12-4 2.5 1.79 2.5 4 2.5 4 1.12 4 2.5-1.79 2.5-4 2.5-4-1.12-4-2.5"/></svg>',
  wave:    '<svg class="icon-svg" viewBox="0 0 24 24"><path d="M7 17l4.2-4.2M11 13l4 4M15.6 8.4L20 4"/><circle cx="4" cy="20" r="1"/></svg>',
  pin:     '<svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>',
  monitor: '<svg class="icon-svg" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>',
  pencil:  '<svg class="icon-svg" viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>',
  check:   '<svg class="icon-svg" viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>',
  checked: '<svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>',
  undo:    '<svg class="icon-svg sm" viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>',
};

// State
let registrations = [];
let posterPresenters = [];
let creditProfessions = [];
let badgeMap = {};
let groups = [];
let checkinLog = [];
let onsitePayMap = {}; // name|idNumber → {meal, time}
let selectedIndex = -1;
let currentPage = 'checkin';

// Boot
(function(){
  const log = sessionStorage.getItem('cl3');
  if(log) try{checkinLog=JSON.parse(log)}catch(e){}
  loadData();
})();

// Page switch
function switchPage(p) {
  currentPage = p;
  document.getElementById('pageCheckin').classList.toggle('active', p==='checkin');
  document.getElementById('pageStats').classList.toggle('active', p==='stats');
  document.getElementById('btnPageCheckin').classList.toggle('active', p==='checkin');
  document.getElementById('btnPageStats').classList.toggle('active', p==='stats');
  if(p==='stats') renderStats();
  if(p==='checkin') setTimeout(()=>document.getElementById('searchInput').focus(),100);
}

// Load
function loadData(){
  showLoading(true);
  fetch(CONFIG.API_URL+'?action=checkin_list',{redirect:'follow'})
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
    .then(d=>{
      if(d.status==='error') throw new Error(d.message);
      registrations=d.registrations||[];
      posterPresenters=d.posterPresenters||[];
      creditProfessions=d.creditProfessions||[];
      badgeMap=d.badgeMap||{};
      groups=d.groups||[];

      // 現場繳費紀錄：合併到報名資料
      onsitePayMap={};
      (d.onsitePayments||[]).forEach(op=>{
        onsitePayMap[op.name+'|'+op.idNumber]=op;
      });
      registrations.forEach(r=>{
        const op=onsitePayMap[r.name+'|'+r.idNumber];
        if(op){
          r.onsitePaid=true;
          r.onsiteMeal=op.meal;
        }
      });

      checkinLog.forEach(l=>{
        const p=registrations.find(r=>r.name===l.name&&r.idNumber===l.idNumber);
        if(p&&!p.checkedIn)p.checkedIn=true;
      });
      showLoading(false);
      updateStats();
      renderLog();
      document.getElementById('searchHint').textContent=`共 ${registrations.length} 位報名`;
      const q=document.getElementById('searchInput').value.trim();
      if(q) doSearch(q);
      if(selectedIndex>=0) selectPerson(selectedIndex);
      if(currentPage==='stats') renderStats();
      showToast(`資料已載入（${registrations.length} 位）`);
    })
    .catch(err=>{
      showLoading(false);
      document.getElementById('searchHint').textContent='載入失敗：'+err.message;
      showToast('載入失敗');
    });
}
function refreshData(){loadData()}

// Search (name OR org), name matches sorted by stroke count
const strokeCollator = new Intl.Collator('zh-Hant-TW-u-co-stroke');
document.getElementById('searchInput').addEventListener('input',function(){doSearch(this.value.trim())});
function doSearch(q){
  const list=document.getElementById('searchList');
  if(!q){list.innerHTML='';document.getElementById('searchHint').textContent=`共 ${registrations.length} 位報名`;return}
  const nameHits=[];
  const orgHits=[];
  registrations.forEach((r,i)=>{
    if(r.name&&r.name.includes(q)) nameHits.push({...r,_idx:i});
    else if(r.org&&r.org.includes(q)) orgHits.push({...r,_idx:i});
  });
  // 姓名結果依筆畫排序
  nameHits.sort((a,b)=>strokeCollator.compare(a.name,b.name));
  // 服務單位結果也依姓名筆畫排序
  orgHits.sort((a,b)=>strokeCollator.compare(a.name,b.name));
  const results=[...nameHits,...orgHits];
  document.getElementById('searchHint').textContent=results.length?`找到 ${results.length} 位`:`「${q}」— 查無此人`;
  list.innerHTML=results.map(r=>{
    const isMem=r.membership==='本會個人會員';
    return `<div class="search-item ${r._idx===selectedIndex?'active':''} ${r.checkedIn?'is-checked':''}" onclick="selectPerson(${r._idx})">
      <div class="si-avatar ${isMem?'':'nm'}">${r.name[0]}</div>
      <div class="si-info"><div class="si-name">${esc(r.name)}</div><div class="si-org">${esc(r.org||'')}</div></div>
      ${r.checkedIn?'<div class="si-check">'+I.checked+'</div>':''}
    </div>`;
  }).join('');
}

// Select
function selectPerson(idx){
  selectedIndex=idx;
  const r=registrations[idx];if(!r)return;
  const isMem=r.membership==='本會個人會員';
  const isPaid=r.feeStatus==='已繳' || r.onsitePaid;
  const isConfirmedNoPay=r.feeStatus==='確認不繳';
  const isOnsitePaid=!!r.onsitePaid;
  // 海報論文：一人可有多筆（EP + 實體）
  const posters=posterPresenters.filter(w=>w.name===r.name);
  const hasPoster=posters.length>0;
  const needsCredit=creditProfessions.includes(r.profession);
  const badgeNo=badgeMap[r.name]||'';

  // Center
  document.getElementById('detailEmpty').style.display='none';
  document.getElementById('personProfile').classList.add('visible');
  const av=document.getElementById('profileAvatar');
  av.textContent=r.name[0];
  av.className='profile-avatar'+(isMem?'':' nm')+(r.checkedIn?' ck':'');
  document.getElementById('profileName').textContent=r.name;

  let badges='';
  if(isMem){
    badges+=`<span class="badge badge-member">會員</span>`;
    if(isPaid){
      badges+=`<span class="badge badge-paid">${isOnsitePaid?'現場繳費':'已繳費'}</span>`;
    } else if(isConfirmedNoPay){
      badges+=`<span class="badge badge-nonmember">確認不繳</span>`;
    } else {
      badges+=`<span class="badge badge-unpaid">未繳費</span>`;
    }
  }
  else badges+=`<span class="badge badge-nonmember">非會員</span>`;
  if(hasPoster) badges+=`<span class="badge badge-poster">海報發表</span>`;
  if(r.checkedIn) badges+=`<span class="badge badge-checkedin">已報到</span>`;
  document.getElementById('profileBadges').innerHTML=badges;

  const feeDisplay=isMem?(isPaid?(isOnsitePaid?'現場繳費':'已繳'):(isConfirmedNoPay?'確認不繳':'未繳')):'—';
  const fields=[['服務單位',r.org],['部門',r.dept],['職稱',r.title],['職類',r.profession],['聯絡電話',r.phone],['Email',r.email],['會員身分',isMem?'本會個人會員':'非會員'],['會費狀態',feeDisplay]];
  document.getElementById('infoGrid').innerHTML=fields.map(([l,v])=>`<div><div class="info-label">${l}</div><div class="info-value">${esc(v||'—')}</div></div>`).join('');

  // Right
  document.getElementById('actionEmpty').style.display='none';
  document.getElementById('actionContent').classList.add('visible');
  let acts='';

  // Badge with serial
  const badgeLabel = badgeNo ? `發放識別證<div class="as">編號：${esc(badgeNo)}</div>` : '發放識別證';
  acts+=`<div class="action-card act-default"><div class="ai-wrap">${I.badge}</div><div class="at"><strong>發放識別證</strong>${badgeNo?'<div class="as">編號：'+esc(badgeNo)+'</div>':''}</div></div>`;

  // 餐點：已繳費用午餐資格欄，現場繳費用選擇的餐點
  const eMeal = isOnsitePaid
    ? (r.onsiteMeal || '')
    : ((r.mealEligibility && r.mealEligibility !== '無') ? r.mealEligibility : '');

  if(isMem&&isPaid){
    if(eMeal && eMeal!=='不用餐'){
      acts+=ac('act-success',I.gift,'發放會員禮品＋午餐餐券（'+esc(eMeal)+'）', isOnsitePaid?'現場繳費':'');
    } else {
      acts+=ac('act-success',I.gift,'發放會員禮品', isOnsitePaid?'現場繳費，不用餐':'此會員不用餐，無需發放餐券');
    }
  } else if(isMem&&isConfirmedNoPay){
    acts+=ac('act-muted',I.gift,'會員（確認不繳費）','無禮品及餐券');
  } else if(isMem&&!isPaid){
    // 未繳費：顯示詢問 + 現場繳費按鈕
    acts+=`<div class="action-card act-warning">
      <div class="ai-wrap">${I.dollar}</div>
      <div class="at" style="flex:1">
        <strong>詢問是否現場繳費</strong>
        <div class="as">會費尚未繳納，繳費後可領取會員禮品及午餐餐券</div>
        <div style="display:flex;gap:.4rem;margin-top:.5rem;flex-wrap:wrap">
          <button class="btn-onsite" onclick="onsitePay(${idx},'葷',event)">現場繳費（葷）</button>
          <button class="btn-onsite" onclick="onsitePay(${idx},'素',event)">現場繳費（素）</button>
          <button class="btn-onsite btn-onsite-alt" onclick="onsitePay(${idx},'不用餐',event)">繳費不用餐</button>
        </div>
      </div>
    </div>`;
  }
  // 非會員有用餐需求（特殊身分）
  if(!isMem && eMeal && eMeal!=='不用餐'){
    acts+=ac('act-success',I.meal,'發放午餐餐券（'+esc(eMeal)+'）','非會員，具特殊身分用餐資格');
  }
  if(hasPoster){
    posters.forEach(p=>{
      const num=p.posterNumber;
      if(num.startsWith('EP')){
        acts+=ac('act-muted',I.monitor,'E-Poster','海報編號：'+esc(num));
      } else {
        acts+=ac('act-accent',I.pin,'實體海報 — 請引導至張貼位置','海報編號：'+esc(num));
      }
    });
  }
  if(needsCredit) acts+=ac('act-info',I.pencil,'引導至紙本學分簽到處','職類：'+esc(r.profession));
  document.getElementById('actionList').innerHTML=acts;

  // Checkin btn
  document.getElementById('checkinBar').innerHTML=r.checkedIn
    ?`<button class="btn-checkin already-done" disabled>${I.checked} 已完成報到</button><button class="btn-undo" onclick="undoCheckin(${idx})">${I.undo} 撤銷</button>`
    :`<button class="btn-checkin" onclick="doCheckin(${idx})">${I.check} 確認報到</button>`;

  const q=document.getElementById('searchInput').value.trim();
  if(q) doSearch(q);
  renderLog();
}

function ac(cls,icon,title,sub){return `<div class="action-card ${cls}"><div class="ai-wrap">${icon}</div><div class="at"><strong>${title}</strong>${sub?'<div class="as">'+sub+'</div>':''}</div></div>`}

// Checkin
function doCheckin(idx){
  const p=registrations[idx];if(!p||p.checkedIn)return;
  p.checkedIn=true;
  const now=new Date();
  checkinLog.unshift({name:p.name,idNumber:p.idNumber,time:now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}),timestamp:now.toISOString()});
  sessionStorage.setItem('cl3',JSON.stringify(checkinLog));
  selectPerson(idx);updateStats();
  showToast(`${p.name} 報到完成`);
  fetch(CONFIG.API_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'checkin',name:p.name,idNumber:p.idNumber,time:now.toISOString()})}).catch(()=>{});
}
function undoCheckin(idx){
  const p=registrations[idx];if(!p)return;
  p.checkedIn=false;
  checkinLog=checkinLog.filter(l=>!(l.name===p.name&&l.idNumber===p.idNumber));
  sessionStorage.setItem('cl3',JSON.stringify(checkinLog));
  selectPerson(idx);updateStats();
  showToast(`${p.name} 已撤銷報到`);
  fetch(CONFIG.API_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'undo_checkin',name:p.name,idNumber:p.idNumber})}).catch(()=>{});
}

// Onsite payment
function onsitePay(idx, meal, e) {
  if(e) e.stopPropagation();
  const p=registrations[idx];if(!p)return;

  p.onsitePaid=true;
  p.onsiteMeal=meal;
  onsitePayMap[p.name+'|'+p.idNumber]={name:p.name,idNumber:p.idNumber,meal:meal};

  selectPerson(idx);
  updateStats();
  if(currentPage==='stats') renderStats();
  showToast(`${p.name} 現場繳費完成（${meal}）`);

  fetch(CONFIG.API_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'onsite_pay',name:p.name,idNumber:p.idNumber,meal:meal,time:new Date().toISOString()})}).catch(()=>{});
}

// Stats
function updateStats(){
  const t=registrations.length;
  const c=registrations.filter(r=>r.checkedIn).length;
  const rate=t>0?Math.round(c/t*100):0;
  document.getElementById('statTotal').textContent=t;
  document.getElementById('statChecked').textContent=c;
  document.getElementById('statRate').textContent=rate+'%';
}

function renderStats(){
  const t=registrations.length;
  const c=registrations.filter(r=>r.checkedIn).length;
  const memAll=registrations.filter(r=>r.membership==='本會個人會員');
  const memCk=memAll.filter(r=>r.checkedIn).length;
  const nonAll=registrations.filter(r=>r.membership!=='本會個人會員');
  const nonCk=nonAll.filter(r=>r.checkedIn).length;

  const pct=n=>t>0?Math.round(n/t*100):0;
  const pctOf=(n,d)=>d>0?Math.round(n/d*100):0;

  // Overall cards — 餐點：午餐資格 + 現場繳費選擇
  const checkedIn = registrations.filter(r=>r.checkedIn);
  const getMeal = r => {
    if(r.onsitePaid) return r.onsiteMeal||'';
    const me=r.mealEligibility;
    return (me && me!=='無') ? me : '';
  };
  const mealMeat = checkedIn.filter(r=>getMeal(r)==='葷').length;
  const mealVeg = checkedIn.filter(r=>getMeal(r)==='素').length;
  const mealNone = checkedIn.filter(r=>getMeal(r)==='不用餐').length;
  const mealOther = checkedIn.length - mealMeat - mealVeg - mealNone;

  // 禮品已發放：已繳費會員（含現場繳費）且已報到
  const giftCheckedIn = checkedIn.filter(r=>{
    const mem=r.membership==='本會個人會員';
    const paid=r.feeStatus==='已繳'||r.onsitePaid;
    return mem&&paid;
  });
  const giftCount = giftCheckedIn.length;
  const onsiteCount = giftCheckedIn.filter(r=>r.onsitePaid).length;

  document.getElementById('statsOverall').innerHTML=`
    ${soCard('全體報名',''+t,''+c,pctOf(c,t),'var(--terra)')}
    ${soCard('會員',''+memAll.length,''+memCk,pctOf(memCk,memAll.length),'var(--primary)')}
    ${soCard('非會員',''+nonAll.length,''+nonCk,pctOf(nonCk,nonAll.length),'var(--text-muted)')}
    ${soCardGift('禮品已發放', giftCount, onsiteCount)}
    ${soCardMeal('已報到餐點統計', mealMeat, mealVeg, mealNone, mealOther)}
  `;

  renderGroupStats();
  if(document.getElementById('sectionFields').style.display!=='none') renderFieldStats();
}

// ===== Tab Switch =====
function switchStatTab(tab, btn) {
  document.querySelectorAll('.stats-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sectionGroups').style.display = tab==='groups'?'block':'none';
  document.getElementById('sectionFields').style.display = tab==='fields'?'block':'none';
  if(tab==='fields') renderFieldStats();
}

// ===== 身分群組統計（下拉選擇）=====
function renderGroupStats(){
  const container=document.getElementById('statsGroups');
  const select=document.getElementById('groupSelect');

  if(groups.length===0){
    select.innerHTML='<option value="__all__">（尚無群組資料）</option>';
    container.innerHTML='<div style="text-align:center;color:var(--text-muted);padding:2rem;font-size:.85rem;">尚無身分群組資料。<br>請在試算表「身分群組」工作表新增群組。</div>';
    return;
  }

  // 更新下拉選項（保留目前選擇）
  const curVal=select.value;
  const opts=['<option value="__all__">全部群組</option>'];
  groups.forEach(g=>opts.push(`<option value="${esc(g.groupName)}">${esc(g.groupName)}</option>`));
  select.innerHTML=opts.join('');
  if([...select.options].some(o=>o.value===curVal)) select.value=curVal;

  const selected=select.value;
  const showGroups=selected==='__all__'?groups:groups.filter(g=>g.groupName===selected);

  container.innerHTML=showGroups.map(g=>{
    const members=g.members.map(name=>{
      const person=registrations.find(r=>r.name===name);
      return {name, checked:person?person.checkedIn:false, found:!!person};
    });
    const ckCount=members.filter(m=>m.checked).length;
    const rate=members.length>0?Math.round(ckCount/members.length*100):0;
    return renderStatGroup(g.groupName, members, ckCount, rate);
  }).join('');
}

// ===== 報名資料分析（依欄位分組）=====
// 職類排序：依報名表單選單順序
const PROFESSION_ORDER = ['醫師','牙醫師','中醫師','藥師','藥事','護理師','護理','物理治療師','物理治療','職能治療師','職能治療','呼吸治療師','呼吸治療','醫事放射師','醫事放射','醫事檢驗師','醫事檢驗','營養師','營養','語言治療師','語言治療','臨床心理師','臨床心理','諮商心理師','聽力師','社工師','社工','其他'];

function renderFieldStats() {
  const field = document.getElementById('fieldSelect').value;
  const q = (document.getElementById('fieldSearchInput')?.value||'').trim();
  const container = document.getElementById('statsFields');
  const hint = document.getElementById('fieldSearchHint');

  const fieldMap = {};
  registrations.forEach(r => {
    const val = r[field] || '（未填）';
    if (!fieldMap[val]) fieldMap[val] = [];
    fieldMap[val].push(r);
  });

  let keys = Object.keys(fieldMap);

  // 排序：職類依報名順序，其他依筆畫
  if (field === 'profession') {
    keys.sort((a, b) => {
      const ia = PROFESSION_ORDER.indexOf(a);
      const ib = PROFESSION_ORDER.indexOf(b);
      if (ia >= 0 && ib >= 0) return ia - ib;
      if (ia >= 0) return -1;
      if (ib >= 0) return 1;
      return strokeCollator.compare(a, b);
    });
  } else {
    keys.sort((a, b) => strokeCollator.compare(a, b));
  }

  if (q) keys = keys.filter(k => k.includes(q));

  const fieldLabels = {org:'服務單位',profession:'職類'};
  const label = fieldLabels[field]||field;

  if (hint) hint.textContent = q
    ? `找到 ${keys.length} 個${label}`
    : `共 ${Object.keys(fieldMap).length} 個${label}`;

  if (keys.length === 0) {
    container.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:2rem;font-size:.85rem;">查無符合的${label}</div>`;
    return;
  }

  container.innerHTML = keys.map(key => {
    const people = fieldMap[key];
    const members = people.map(r => ({name: r.name, checked: r.checkedIn, found: true}));
    const ckCount = members.filter(m => m.checked).length;
    const rate = members.length > 0 ? Math.round(ckCount / members.length * 100) : 0;
    return renderStatGroup(key, members, ckCount, rate);
  }).join('');
}

// ===== 共用：統計群組卡片 =====
function renderStatGroup(title, members, ckCount, rate) {
  return `<div class="stats-group" onclick="this.classList.toggle('expanded')">
    <div class="sg-header">
      <h3>
        <svg class="icon-svg sm" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        ${esc(title)}
      </h3>
      <div class="sg-stat">
        <span>${ckCount} / ${members.length}</span>
        <span class="sg-rate">${rate}%</span>
      </div>
    </div>
    <div class="sg-body">
      <div class="sg-member-list">
        ${members.map(m=>`<div class="sg-member ${m.checked?'checked':'unchecked'}">
          <div class="sg-dot"></div>
          <span class="sg-mname">${esc(m.name)}</span>
          ${!m.found?'<span style="font-size:.7rem;color:var(--warning)">(未報名)</span>':''}
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function soCard(label,total,checked,rate,color){
  return `<div class="so-card">
    <div class="so-label">${label}</div>
    <div class="so-val">${checked} <span style="font-size:.82rem;font-weight:500;color:var(--text-muted)">/ ${total}</span></div>
    <div class="so-bar"><div class="so-bar-fill" style="width:${rate}%;background:${color}"></div></div>
    <div style="font-size:.72rem;color:var(--text-muted);margin-top:.15rem">報到率 ${rate}%</div>
  </div>`;
}

function soCardGift(label, count, onsiteCount) {
  return `<div class="so-card">
    <div class="so-label">${label}</div>
    <div class="so-val">${count} <span style="font-size:.82rem;font-weight:500;color:var(--text-muted)">份</span></div>
    <div style="font-size:.72rem;color:var(--text-muted);margin-top:.3rem">已繳費會員（含現場繳費）且已報到</div>
    ${onsiteCount>0?`<div style="font-size:.76rem;font-weight:600;color:var(--warning);margin-top:.25rem">其中現場繳費 ${onsiteCount} 人</div>`:''}
  </div>`;
}

function soCardMeal(label, meat, veg, none, other) {
  const total = meat + veg + none + other;
  return `<div class="so-card">
    <div class="so-label">${label}</div>
    <div style="display:flex;gap:.75rem;margin-top:.35rem;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:.3rem">
        <div style="width:10px;height:10px;border-radius:2px;background:#c45a3c"></div>
        <span style="font-size:.82rem;font-weight:600">葷 ${meat}</span>
      </div>
      <div style="display:flex;align-items:center;gap:.3rem">
        <div style="width:10px;height:10px;border-radius:2px;background:#5a7d5c"></div>
        <span style="font-size:.82rem;font-weight:600">素 ${veg}</span>
      </div>
      <div style="display:flex;align-items:center;gap:.3rem">
        <div style="width:10px;height:10px;border-radius:2px;background:var(--text-muted)"></div>
        <span style="font-size:.82rem;font-weight:600">不用餐 ${none}</span>
      </div>
      ${other>0?`<div style="display:flex;align-items:center;gap:.3rem">
        <div style="width:10px;height:10px;border-radius:2px;background:var(--border)"></div>
        <span style="font-size:.82rem;font-weight:600;color:var(--text-muted)">無用餐資格 ${other}</span>
      </div>`:''}
    </div>
    <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-top:.4rem;background:var(--border-light)">
      ${total>0?`<div style="width:${meat/total*100}%;background:#c45a3c"></div><div style="width:${veg/total*100}%;background:#5a7d5c"></div><div style="width:${none/total*100}%;background:var(--text-muted)"></div>`:''}
    </div>
    <div style="font-size:.72rem;color:var(--text-muted);margin-top:.2rem;letter-spacing:.01em">需備便當：${meat+veg} 份（葷 ${meat} + 素 ${veg}）</div>
  </div>`;
}

// Log
function renderLog(){
  const s=document.getElementById('logSection'),l=document.getElementById('logList');
  if(!checkinLog.length){s.style.display='none';return}
  s.style.display='block';
  l.innerHTML=checkinLog.slice(0,10).map(x=>`<div class="log-item"><span class="ln">${esc(x.name)}</span><span class="lt">${x.time}</span></div>`).join('');
}

// Helpers
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function showLoading(s){document.getElementById('loadingOverlay').classList.toggle('show',s)}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
</script>
