<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>評分後台管理｜TSMCSD 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500&display=swap');
:root{
  --ink:#1c1c2e;--slate:#4a5568;--muted:#718096;
  --border:#e2e8f0;--border2:#edf2f7;--bg:#f7f6f3;--white:#fff;
  --blue:#1e4d8c;--blue-l:#dbeafe;--blue-d:#e8f0fb;
  --gold:#9a6f0a;--gold-bg:#fdf6e3;
  --green:#1e6b45;--green-bg:#f0faf5;
  --red:#b91c1c;--red-bg:#fff1f1;--red-l:#fee2e2;
  --orange:#c05621;--orange-bg:#fff7ed;
  --sh:0 1px 3px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04);
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.65;font-weight:400;}

/* ── 分層字重 ── */
h1,h2,h3,h4,h5,h6,
.tn-brand, .adm-login-card h2,
.sec-head h3, .modal-head h4,
.stat-num { font-weight:700; }
.tab, .btn, .btn-adm-login,
.f-lbl, th, .chip { font-weight:500; }
td, .stat-lbl, .tn-badge { font-weight:400; }
a{color:inherit;text-decoration:none;}
button,input,select,textarea{font-family:inherit;font-size:inherit;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink);}
.adm-login-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:2rem;width:340px;max-width:calc(100vw - 2rem);}
.adm-login-card h2{font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;color:white;font-size:1.25rem;font-weight:700;margin-bottom:.25rem;text-align:center;}
.adm-login-card p{color:rgba(255,255,255,.35);font-size:.78rem;text-align:center;margin-bottom:1.5rem;}
.f-lbl{display:block;font-size:.88rem;font-weight:600;color:rgba(255,255,255,.9);margin-bottom:.4rem;}
.f-in{width:100%;padding:.78rem 1rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.28);border-radius:9px;color:white;font-size:1rem;font-weight:500;margin-bottom:.9rem;transition:all .2s;}
.f-in::placeholder{color:rgba(255,255,255,.2);}
.f-in:focus{outline:none;border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.12);}
.btn-adm-login{width:100%;padding:.82rem;background:linear-gradient(135deg,#1e4d8c,#163870);border:1px solid rgba(255,255,255,.15);border-radius:9px;color:white;font-size:1rem;font-weight:500;cursor:pointer;transition:opacity .2s;}
.btn-adm-login:hover{opacity:.85;}
.login-err{margin-top:.65rem;padding:.5rem .8rem;background:rgba(185,28,28,.25);border:1px solid rgba(185,28,28,.4);border-radius:7px;font-size:.8rem;color:#fca5a5;display:none;}

/* APP */
#app{display:none;}
#app.show{display:block;}

/* Top nav */
.topnav{position:sticky;top:0;z-index:200;height:54px;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.tn-brand{font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;font-size:1rem;font-weight:700;color:white;letter-spacing:.02em;}
.tn-badge{font-size:.8rem;color:rgba(255,255,255,.45);}
.btn-tn-out{background:none;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:.28rem .65rem;font-size:.72rem;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;}
.btn-tn-out:hover{border-color:rgba(255,255,255,.5);color:white;}

/* Tab bar */
.tabbar{background:white;border-bottom:1px solid var(--border);display:flex;padding:0 1.5rem;gap:0;}
.tab{padding:.9rem 1.2rem;font-size:.88rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .18s;white-space:nowrap;}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab:hover{color:var(--slate);}

/* Content */
.content{padding:1.5rem 2rem;max-width:1100px;}

/* Stat cards */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:1.5rem;}
.stat-card{background:white;border:1px solid var(--border2);border-radius:var(--r);padding:1rem 1.1rem;box-shadow:var(--sh);}
.stat-num{font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;font-size:1.9rem;font-weight:500;color:var(--ink);}
.stat-lbl{font-size:.82rem;color:var(--muted);margin-top:.2rem;}
.stat-card.blue .stat-num{color:var(--blue);}
.stat-card.green .stat-num{color:var(--green);}
.stat-card.gold .stat-num{color:var(--gold);}
.stat-card.orange .stat-num{color:var(--orange);}

/* Section */
.sec{background:white;border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:1.25rem;overflow:hidden;}
.sec-head{padding:.9rem 1.25rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.sec-head h3{font-size:1.05rem;font-weight:700;color:var(--ink);}
.sec-body{padding:1.25rem;}

/* Table */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:.65rem .9rem;font-size:.8rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);background:var(--bg);text-align:left;white-space:nowrap;}
td{padding:.72rem .9rem;font-size:.9rem;border-top:1px solid var(--border2);vertical-align:middle;}
tr:hover td{background:#fafafa;}

/* Tags & Chips */
.chip{padding:.22rem .7rem;border-radius:20px;font-size:.75rem;font-weight:700;letter-spacing:.04em;display:inline-block;}
.chip-blue{background:var(--blue-l);color:var(--blue);}
.chip-green{background:#d1fae5;color:var(--green);}
.chip-orange{background:#ffedd5;color:var(--orange);}
.chip-gray{background:var(--border2);color:var(--muted);}
.chip-red{background:var(--red-l);color:var(--red);}

/* Score progress */
.sc-prog{display:flex;align-items:center;gap:.5rem;font-size:.78rem;}
.sc-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;min-width:60px;}
.sc-fill{height:100%;border-radius:3px;}
.sc-fill.done{background:var(--green);}
.sc-fill.part{background:#f59e0b;}
.sc-fill.none{background:var(--border);}

/* Score avg */
.avg-num{font-weight:600;color:var(--ink);}
.avg-rec{font-size:.68rem;font-weight:700;}
.avg-rec.yes{color:var(--green);}
.avg-rec.no{color:var(--muted);}

/* Assignment */
.assign-wrap{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center;}
.assign-chip{padding:.22rem .6rem;background:var(--blue-d);color:var(--blue);border-radius:6px;font-size:.72rem;display:flex;align-items:center;gap:.3rem;}
.assign-chip .rm{cursor:pointer;color:var(--muted);font-size:.8rem;line-height:1;}
.assign-chip .rm:hover{color:var(--red);}
.assign-add{background:white;border:1px dashed var(--border);border-radius:6px;font-size:.72rem;color:var(--muted);cursor:pointer;padding:.22rem .6rem;transition:all .2s;}
.assign-add:hover{border-color:var(--blue);color:var(--blue);}
.assign-sel{font-size:.78rem;padding:.28rem .5rem;border:1px solid var(--border);border-radius:6px;background:white;color:var(--ink);cursor:pointer;}

/* Buttons */
.btn{padding:.5rem .9rem;border-radius:7px;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .18s;border:none;display:inline-flex;align-items:center;gap:.35rem;}
.btn-primary{background:var(--blue);color:white;}
.btn-primary:hover{opacity:.85;}
.btn-success{background:var(--green);color:white;}
.btn-success:hover{opacity:.85;}
.btn-danger{background:var(--red);color:white;}
.btn-danger:hover{opacity:.85;}
.btn-outline{background:white;border:1.5px solid var(--border);color:var(--slate);}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);}
.btn-sm{padding:.35rem .65rem;font-size:.75rem;}

/* Form */
.form-row{display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem;}
.form-grp{display:flex;flex-direction:column;gap:.3rem;flex:1;min-width:120px;}
.form-grp label{font-size:.85rem;font-weight:600;color:var(--slate);}
.form-grp input,.form-grp select{padding:.62rem .8rem;border:1.5px solid var(--border);border-radius:7px;background:white;color:var(--ink);font-size:.95rem;transition:border-color .2s;}
.form-grp input:focus,.form-grp select:focus{outline:none;border-color:var(--blue);}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.7rem 1rem;border-radius:9px;font-size:.85rem;color:white;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:9999;animation:tIn .3s ease;max-width:300px;}
.toast.ok{background:var(--green);}.toast.err{background:var(--red);}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ldr{position:fixed;inset:0;background:rgba(255,255,255,.8);display:none;align-items:center;justify-content:center;z-index:9998;}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .65s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:500;padding:1rem;}
.modal-bg.show{display:flex;}
.modal{background:white;border-radius:14px;width:460px;max-width:100%;box-shadow:0 16px 48px rgba(0,0,0,.2);overflow:hidden;}
.modal-head{padding:1rem 1.25rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
.modal-head h4{font-size:.95rem;font-weight:600;}
.modal-close{background:none;border:none;font-size:1.1rem;color:var(--muted);cursor:pointer;}
.modal-body{padding:1.25rem;}
.modal-foot{padding:.9rem 1.25rem;border-top:1px solid var(--border2);display:flex;gap:.6rem;justify-content:flex-end;}

/* Detail panel */
.detail-row{margin-bottom:.75rem;}
.detail-lbl{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.25rem;}
.detail-val{font-size:.85rem;color:var(--ink);line-height:1.7;}
.crit-score-row{display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--border2);font-size:.82rem;}
.crit-score-row:last-child{border-bottom:none;}

@media(max-width:900px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .content{padding:1.25rem 1.25rem;}
}
@media(max-width:600px){
  .content{padding:.85rem;}
  .topnav{padding:0 .85rem; height:auto; padding:.5rem .85rem;}
  .tn-brand{font-size:.88rem;}
  .tabbar{padding:0 .35rem;overflow-x:auto;white-space:nowrap;}
  .tab{padding:.75rem .85rem;font-size:.82rem;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .form-row{flex-direction:column;}
  .tbl-wrap{font-size:.84rem;}
  td,th{padding:.55rem .6rem;}
  .modal{border-radius:10px;}
  .modal-head{padding:.85rem 1rem;}
  .modal-body{padding:1rem;}
}
@media(max-width:400px){
  .stats-row{grid-template-columns:1fr;}
  body{font-size:15px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="adm-login-card">
    <h2>評分後台管理</h2>
    <p>TSMCSD 2026 · 管理員專用</p>
    <label class="f-lbl">管理員密碼</label>
    <input class="f-in" id="admPw" type="password" placeholder="請輸入密碼"
           onkeydown="if(event.key==='Enter')admLogin()">
    <button class="btn-adm-login" onclick="admLogin()">進入後台</button>
    <div class="login-err" id="admErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="topnav">
    <div style="display:flex;align-items:center;gap:.75rem">
      <span class="tn-brand">TSMCSD 2026 評分後台</span>
      <span class="tn-badge">管理員</span>
    </div>
    <button class="btn-tn-out" onclick="if(confirm('確定登出？'))location.reload()">登出</button>
  </nav>

  <div class="tabbar">
    <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 總覽統計</div>
    <div class="tab" data-tab="assign" onclick="switchTab('assign')">📋 指派評審</div>
    <div class="tab" data-tab="results" onclick="switchTab('results')">🏆 評分結果</div>
    <div class="tab" data-tab="reviewers" onclick="switchTab('reviewers')">👥 委員帳號</div>
  </div>

  <!-- DASHBOARD -->
  <div class="content" id="tab-dashboard">
    <div class="stats-row" id="statsRow"></div>
    <div class="sec">
      <div class="sec-head">
        <h3>各論文評審進度</h3>
        <button class="btn btn-outline btn-sm" onclick="loadDashboard()">🔄 重新整理</button>
      </div>
      <div class="sec-body">
        <div class="tbl-wrap">
          <table id="dashTable">
            <thead><tr>
              <th>編號</th><th>論文題目</th><th>類別</th>
              <th>指派委員</th><th>已評 / 應評</th><th>平均分</th><th>推薦</th>
            </tr></thead>
            <tbody id="dashBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ASSIGN -->
  <div class="content" id="tab-assign" style="display:none">
    <div class="sec">
      <div class="sec-head">
        <h3>指派評審委員</h3>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-outline btn-sm" onclick="autoAssign()">⚡ 自動平均指派</button>
          <button class="btn btn-success btn-sm" onclick="saveAssignments()">💾 儲存指派</button>
        </div>
      </div>
      <div class="sec-body">
        <p style="font-size:.78rem;color:var(--muted);margin-bottom:1rem">
          點選「＋委員」為每篇論文新增評審委員，完成後按「儲存指派」。
        </p>
        <div class="tbl-wrap">
          <table id="assignTable">
            <thead><tr>
              <th>編號</th><th>論文題目</th><th>類別</th><th>指派委員（可多位）</th>
            </tr></thead>
            <tbody id="assignBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="content" id="tab-results" style="display:none">
    <div class="sec">
      <div class="sec-head">
        <h3>評分詳細結果</h3>
        <div style="display:flex;align-items:center;gap:.5rem">
          <input type="text" id="resultSearch" placeholder="搜尋題目…"
                 style="padding:.4rem .7rem;border:1px solid var(--border);border-radius:7px;font-size:.8rem;width:180px"
                 oninput="filterResults()">
          <button class="btn btn-outline btn-sm" onclick="loadDashboard()">🔄 重新整理</button>
        </div>
      </div>
      <div class="sec-body">
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>編號</th><th>論文題目</th><th>類別</th>
              <th>平均總分</th><th>推薦</th><th>評審數</th><th>詳細</th>
            </tr></thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- REVIEWERS -->
  <div class="content" id="tab-reviewers" style="display:none">
    <div class="sec">
      <div class="sec-head">
        <h3>新增委員帳號</h3>
      </div>
      <div class="sec-body">
        <div class="form-row">
          <div class="form-grp"><label>帳號</label><input id="nwUser" placeholder="reviewer01"></div>
          <div class="form-grp"><label>密碼</label><input id="nwPw" type="text" placeholder="pass1234"></div>
          <div class="form-grp"><label>姓名</label><input id="nwName" placeholder="王評審委員"></div>
          <button class="btn btn-primary" onclick="addReviewer()" style="margin-bottom:0">＋ 新增</button>
        </div>
      </div>
    </div>
    <div class="sec">
      <div class="sec-head">
        <h3>委員帳號列表</h3>
        <button class="btn btn-outline btn-sm" onclick="loadReviewers()">🔄 重新整理</button>
      </div>
      <div class="sec-body">
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>帳號</th><th>密碼</th><th>姓名</th><th>狀態</th><th>操作</th>
            </tr></thead>
            <tbody id="rvBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 評分詳細 Modal -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <div class="modal-head">
      <h4 id="detailTitle">評分詳細</h4>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal()">關閉</button>
    </div>
  </div>
</div>

<div class="ldr" id="ldr"><div class="spinner"></div></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz2njUGr6eORWe6V5iMITA_dbpuOzhOebyxDW43P8RySVezxUevEOvQZGUV0tl_Mhm9/exec';

const CRITERIA = [
  { id:'c1', label:'主題創新性',           max:20 },
  { id:'c2', label:'研究設計合理性',       max:15 },
  { id:'c3', label:'文字表達流暢性',       max:15 },
  { id:'c4', label:'內容結構的完整性',     max:25 },
  { id:'c5', label:'結果與討論的正確性',   max:15 },
  { id:'c6', label:'學術貢獻',             max:10 }
];
const THRESHOLD = 80;

let dashData = null; // { papers, reviewers, stats }
let assignments = {}; // { paperId: [username,...] }
let curTab = 'dashboard';

// ── Admin login ──
async function admLogin(){
  const pw=document.getElementById('admPw').value.trim();
  const eEl=document.getElementById('admErr');
  eEl.style.display='none';
  if(!pw) return;
  setLdr(true);
  try{
    const r=await api({action:'adminLogin',password:pw});
    if(r.success){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('app').classList.add('show');
      await loadDashboard();
    } else {
      eEl.textContent='⚠ '+(r.message||'密碼錯誤');
      eEl.style.display='block';
    }
  } catch{ eEl.textContent='⚠ 連線失敗'; eEl.style.display='block'; }
  setLdr(false);
}

// ── Tab switch ──
function switchTab(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  ['dashboard','assign','results','reviewers'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'block':'none';
  });
  if(t==='reviewers') loadReviewers();
}

// ── Load dashboard ──
async function loadDashboard(){
  setLdr(true);
  try{
    const r=await api({action:'adminGetDashboard'});
    if(!r.success){ showToast('載入失敗','err'); setLdr(false); return; }
    dashData=r;
    // load assignments separately
    const ar=await api({action:'adminGetAssignments'});
    assignments=ar.assignments||{};
    renderStats(r.stats);
    renderDashTable(r.papers);
    renderAssignTable(r.papers, r.reviewers);
    renderResultsTable(r.papers);
  } catch(e){ showToast('連線失敗','err'); console.error(e); }
  setLdr(false);
}

function renderStats(s){
  if(!s) return;
  const pct=s.totalPapers?Math.round(s.reviewedPapers/s.totalPapers*100):0;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card blue"><div class="stat-num">${s.totalPapers}</div><div class="stat-lbl">總投稿篇數</div></div>
    <div class="stat-card"><div class="stat-num">${s.reviewedPapers}<span style="font-size:.9rem;color:var(--muted)"> (${pct}%)</span></div><div class="stat-lbl">已有評分</div></div>
    <div class="stat-card green"><div class="stat-num">${s.fullyReviewed}</div><div class="stat-lbl">已完全評審</div></div>
    <div class="stat-card gold"><div class="stat-num">${s.recommended}</div><div class="stat-lbl">推薦壁報 ≥${THRESHOLD}分</div></div>
    <div class="stat-card orange"><div class="stat-num">${s.activeReviewers}</div><div class="stat-lbl">啟用委員數</div></div>
  `;
}

function renderDashTable(papers){
  if(!papers) return;
  document.getElementById('dashBody').innerHTML=papers.map(p=>{
    const assigned=assignments[p.id]||[];
    const done=p.reviews.length;
    const total=assigned.length||0;
    const pct=total?Math.round(done/total*100):0;
    const fillClass=done===0?'none':done>=total?'done':'part';
    return `<tr>
      <td><span class="chip chip-blue">${p.paperNo}</span></td>
      <td style="max-width:280px;line-height:1.5">${esc(p.title)}</td>
      <td>${p.category}</td>
      <td style="font-size:.78rem;color:var(--muted)">${assigned.join('、')||'—'}</td>
      <td>
        <div class="sc-prog">
          <span>${done}/${total}</span>
          <div class="sc-bar"><div class="sc-fill ${fillClass}" style="width:${pct}%"></div></div>
        </div>
      </td>
      <td class="avg-num">${p.avgTotal!==null?p.avgTotal:'—'}</td>
      <td>${p.avgTotal!==null
        ? (p.recommended?'<span class="chip chip-green">推薦</span>':'<span class="chip chip-gray">未達標</span>')
        : '—'}</td>
    </tr>`;
  }).join('');
}

// ── Assign ──
function renderAssignTable(papers, reviewers){
  if(!papers) return;
  document.getElementById('assignBody').innerHTML=papers.map(p=>{
    const assigned=assignments[p.id]||[];
    const options=(reviewers||[]).map(r=>`<option value="${r.username}">${r.name}(${r.username})</option>`).join('');
    return `<tr id="arow_${p.id}">
      <td><span class="chip chip-blue">${p.paperNo}</span></td>
      <td style="max-width:260px;line-height:1.5">${esc(p.title)}</td>
      <td>${p.category}</td>
      <td>
        <div class="assign-wrap" id="aw_${p.id}">
          ${assigned.map(u=>`
            <span class="assign-chip">${u}
              <span class="rm" onclick="removeAssign('${p.id}','${u}')">✕</span>
            </span>`).join('')}
          <select class="assign-sel" id="asel_${p.id}" onchange="addAssign('${p.id}')">
            <option value="">＋ 委員</option>${options}
          </select>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function addAssign(pid){
  const sel=document.getElementById('asel_'+pid);
  const u=sel.value; if(!u) return;
  sel.value='';
  if(!assignments[pid]) assignments[pid]=[];
  if(assignments[pid].includes(u)){ showToast('此委員已在列表中','err'); return; }
  assignments[pid].push(u);
  refreshAssignRow(pid);
}

function removeAssign(pid, u){
  if(!assignments[pid]) return;
  assignments[pid]=assignments[pid].filter(x=>x!==u);
  refreshAssignRow(pid);
}

function refreshAssignRow(pid){
  const wrap=document.getElementById('aw_'+pid);
  if(!wrap) return;
  const assigned=assignments[pid]||[];
  const sel=document.getElementById('asel_'+pid);
  const selHTML=sel?sel.outerHTML:'';
  wrap.innerHTML=assigned.map(u=>`
    <span class="assign-chip">${u}
      <span class="rm" onclick="removeAssign('${pid}','${u}')">✕</span>
    </span>`).join('')+selHTML;
}

async function saveAssignments(){
  if(!confirm('確認儲存所有指派設定？')) return;
  setLdr(true);
  try{
    const r=await api({action:'adminSaveAssignments',assignmentsJson:JSON.stringify(assignments)});
    if(r.success) showToast(`指派已儲存（${r.saved} 筆）`,'ok');
    else showToast('儲存失敗','err');
  } catch{ showToast('連線失敗','err'); }
  setLdr(false);
}

function autoAssign(){
  if(!dashData) return;
  const {papers,reviewers}=dashData;
  const active=(reviewers||[]).filter(r=>r.enabled);
  if(!active.length){ showToast('沒有啟用中的委員','err'); return; }
  if(!confirm(`將 ${papers.length} 篇論文平均分配給 ${active.length} 位委員？\n（每篇指定1位，循環分配）`)) return;
  papers.forEach((p,i)=>{
    const rv=active[i%active.length];
    assignments[p.id]=[rv.username];
  });
  renderAssignTable(papers, reviewers);
  showToast('自動指派完成，請記得按「儲存指派」','ok');
}

// ── Results ──
function renderResultsTable(papers){
  if(!papers) return;
  const sorted=[...papers].sort((a,b)=>(b.avgTotal??-1)-(a.avgTotal??-1));
  document.getElementById('resultsBody').innerHTML=sorted.map(p=>`
    <tr data-title="${esc(p.title).toLowerCase()}">
      <td><span class="chip chip-blue">${p.paperNo}</span></td>
      <td style="max-width:280px;line-height:1.5">${esc(p.title)}</td>
      <td>${p.category}</td>
      <td class="avg-num" style="font-size:1rem">${p.avgTotal!==null?p.avgTotal+'分':'—'}</td>
      <td>${p.avgTotal!==null
        ?(p.recommended?'<span class="chip chip-green">⭐ 推薦</span>':'<span class="chip chip-gray">未達標</span>')
        :'—'}</td>
      <td style="color:var(--muted)">${p.reviews.length} 位</td>
      <td><button class="btn btn-outline btn-sm" onclick="showDetail('${p.id}')">詳細</button></td>
    </tr>`).join('');
}

function filterResults(){
  const q=document.getElementById('resultSearch').value.toLowerCase();
  document.querySelectorAll('#resultsBody tr').forEach(tr=>{
    tr.style.display=!q||tr.dataset.title.includes(q)?'':'none';
  });
}

function showDetail(pid){
  if(!dashData) return;
  const p=dashData.papers.find(x=>x.id===pid); if(!p) return;
  document.getElementById('detailTitle').textContent=p.paperNo+' 評分詳細';
  const maxTotal=CRITERIA.reduce((s,c)=>s+c.max,0);
  let html=`<div class="detail-row"><div class="detail-lbl">論文題目</div>
    <div class="detail-val" style="font-weight:500">${esc(p.title)}</div></div>`;

  if(!p.reviews.length){
    html+='<p style="color:var(--muted);font-size:.85rem">尚無評分記錄</p>';
  } else {
    p.reviews.forEach((r,i)=>{
      html+=`<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border2)">
        <div style="display:flex;justify-content:space-between;margin-bottom:.6rem">
          <span style="font-size:.78rem;font-weight:600;color:var(--slate)">評審 ${i+1}：${r.reviewer}</span>
          <span style="font-size:.78rem;color:var(--muted)">${r.time}</span>
        </div>`;
      CRITERIA.forEach(c=>{
        html+=`<div class="crit-score-row">
          <span>${c.label}</span>
          <span style="font-weight:600;color:var(--blue)">${r.scores[c.id]??0} / ${c.max}</span>
        </div>`;
      });
      html+=`<div style="display:flex;justify-content:space-between;padding:.5rem 0;font-weight:600">
        <span>總分</span>
        <span style="color:${r.total>=THRESHOLD?'var(--green)':'var(--ink)'};font-size:1.05rem">${r.total} / ${maxTotal}</span>
      </div>`;
      if(r.comment) html+=`<div style="font-size:.8rem;color:var(--muted);background:var(--bg);padding:.5rem .7rem;border-radius:7px">💬 ${esc(r.comment)}</div>`;
      html+='</div>';
    });

    if(p.reviews.length>1){
      html+=`<div class="total-strip" style="margin-top:1rem">
        <span style="font-size:.85rem;font-weight:600;color:var(--gold)">平均總分</span>
        <span style="font-family:serif;font-size:1.4rem;color:var(--gold)">${p.avgTotal}</span>
      </div>`;
    }
  }
  document.getElementById('detailBody').innerHTML=html;
  document.getElementById('detailModal').classList.add('show');
}
function closeModal(){ document.getElementById('detailModal').classList.remove('show'); }

// ── Reviewers ──
async function loadReviewers(){
  setLdr(true);
  try{
    const r=await api({action:'adminGetReviewers'});
    if(r.success) renderRvTable(r.reviewers);
    else showToast('載入失敗','err');
  } catch{ showToast('連線失敗','err'); }
  setLdr(false);
}

function renderRvTable(reviewers){
  document.getElementById('rvBody').innerHTML=(reviewers||[]).map(r=>`
    <tr>
      <td style="font-weight:500">${r.username}</td>
      <td style="color:var(--muted);font-family:monospace">${r.password}</td>
      <td>${r.name}</td>
      <td><span class="chip ${r.enabled?'chip-green':'chip-gray'}">${r.enabled?'啟用':'停用'}</span></td>
      <td>
        <div style="display:flex;gap:.4rem">
          <button class="btn btn-outline btn-sm"
            onclick="toggleReviewer('${r.username}',${!r.enabled})">${r.enabled?'停用':'啟用'}</button>
          <button class="btn btn-danger btn-sm"
            onclick="deleteReviewer('${r.username}')">刪除</button>
        </div>
      </td>
    </tr>`).join('');
}

async function addReviewer(){
  const u=document.getElementById('nwUser').value.trim();
  const pw=document.getElementById('nwPw').value.trim();
  const n=document.getElementById('nwName').value.trim();
  if(!u||!pw||!n){ showToast('請填寫完整欄位','err'); return; }
  setLdr(true);
  try{
    const r=await api({action:'adminAddReviewer',username:u,password:pw,name:n});
    if(r.success){
      showToast('委員已新增','ok');
      document.getElementById('nwUser').value='';
      document.getElementById('nwPw').value='';
      document.getElementById('nwName').value='';
      loadReviewers();
    } else showToast(r.message||'新增失敗','err');
  } catch{ showToast('連線失敗','err'); }
  setLdr(false);
}

async function toggleReviewer(u, enabled){
  setLdr(true);
  try{
    const r=await api({action:'adminUpdateReviewer',username:u,enabled:String(enabled)});
    if(r.success){ showToast(`帳號已${enabled?'啟用':'停用'}`,'ok'); loadReviewers(); }
    else showToast('操作失敗','err');
  } catch{ showToast('連線失敗','err'); }
  setLdr(false);
}

async function deleteReviewer(u){
  if(!confirm(`確定刪除委員「${u}」？`)) return;
  setLdr(true);
  try{
    const r=await api({action:'adminDeleteReviewer',username:u});
    if(r.success){ showToast('委員已刪除','ok'); loadReviewers(); }
    else showToast(r.message||'刪除失敗','err');
  } catch{ showToast('連線失敗','err'); }
  setLdr(false);
}

// ── Helpers ──
async function api(params){
  const fd=new FormData();
  Object.entries(params).forEach(([k,v])=>fd.append(k,v));
  return (await fetch(APPS_SCRIPT_URL,{method:'POST',body:fd})).json();
}
function setLdr(v){ document.getElementById('ldr').style.display=v?'flex':'none'; }
function showToast(msg,type){
  const t=document.createElement('div'); t.className='toast '+type; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
