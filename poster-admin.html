<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿編號管理 | TSMCSD 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1565C0;
  --primary-light: #e3f2fd;
  --success: #2e7d32;
  --success-light: #e8f5e9;
  --danger: #c62828;
  --danger-light: #ffebee;
  --warning: #e65100;
  --warning-light: #fff3e0;
  --font: 'Noto Sans TC','Microsoft JhengHei',sans-serif;
  --radius: 10px;
  --shadow: 0 2px 10px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: #f0f4f8; color: #1a1a2e; line-height: 1.6; }

.header {
  background: linear-gradient(135deg, #0d47a1, #1976d2);
  color: white;
  padding: 1.5rem 2rem;
}
.header h1 { font-size: 1.3rem; font-weight: 900; }
.header p  { font-size: 0.88rem; opacity: 0.85; margin-top: 0.2rem; }

.main { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem 3rem; }

/* Setup card */
.setup-card {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.25rem;
}
.setup-card h2 { font-size: 1rem; color: var(--primary); margin-bottom: 0.75rem; }
.setup-row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
.setup-row input {
  flex: 1; min-width: 320px;
  padding: 0.6rem 0.9rem;
  border: 1.5px solid #ccc;
  border-radius: 8px;
  font-size: 0.92rem;
  font-family: var(--font);
}
.setup-row input:focus { outline: none; border-color: var(--primary); }
.btn {
  padding: 0.6rem 1.4rem;
  border: none;
  border-radius: 8px;
  font-size: 0.92rem;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  transition: filter 0.15s, transform 0.1s;
  white-space: nowrap;
}
.btn:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: none; }
.btn-primary { background: var(--primary); color: white; }
.btn-success { background: var(--success); color: white; }
.btn-warning { background: var(--warning); color: white; }
.btn-danger  { background: var(--danger);  color: white; }

/* Info bar */
.info-bar {
  padding: 0.65rem 1rem;
  border-radius: 8px;
  font-size: 0.85rem;
  margin-bottom: 1rem;
  display: none;
}
.info-bar.show { display: block; }
.info-bar.info    { background: var(--primary-light); color: var(--primary); border-left: 4px solid var(--primary); }
.info-bar.success { background: var(--success-light); color: var(--success); border-left: 4px solid var(--success); }
.info-bar.error   { background: var(--danger-light);  color: var(--danger);  border-left: 4px solid var(--danger); }
.info-bar.warning { background: var(--warning-light); color: var(--warning); border-left: 4px solid var(--warning); }

/* Table area */
.table-card {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 1.25rem;
}
.table-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.75rem;
  padding: 1rem 1.25rem;
  border-bottom: 2px solid #e3f2fd;
  background: #fafbff;
}
.table-toolbar h2 { font-size: 1rem; color: var(--primary); }
.toolbar-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

.legend {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  padding: 0.6rem 1.25rem;
  background: #f9f9f9;
  border-bottom: 1px solid #eee;
  font-size: 0.8rem;
}
.legend-item { display: flex; align-items: center; gap: 0.35rem; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-unchanged { background: #ccc; }
.dot-changed   { background: #f57c00; }
.dot-error     { background: var(--danger); }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
thead th {
  background: var(--primary);
  color: white;
  padding: 0.6rem 0.75rem;
  text-align: left;
  font-weight: 700;
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid #eee; transition: background 0.1s; }
tbody tr:hover { background: #f5f8ff; }
tbody tr.changed { background: #fff8e1; }
tbody tr.error-row { background: #fff0f0; }
td { padding: 0.5rem 0.75rem; vertical-align: middle; }
td.seq { text-align: center; color: #999; font-size: 0.8rem; width: 2.5rem; }
td.old-id { color: #888; font-size: 0.82rem; white-space: nowrap; }
td.new-id-cell { min-width: 240px; }
td.new-id-cell input {
  width: 100%;
  padding: 0.35rem 0.6rem;
  border: 1.5px solid #ddd;
  border-radius: 6px;
  font-size: 0.85rem;
  font-family: var(--font);
  transition: border-color 0.15s;
}
td.new-id-cell input:focus { outline: none; border-color: var(--primary); }
td.new-id-cell input.modified { border-color: #f57c00; background: #fffde7; }
td.paper-title { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #333; }
td.category { text-align: center; }
.cat-badge {
  display: inline-block;
  padding: 0.15rem 0.6rem;
  border-radius: 12px;
  font-size: 0.78rem;
  font-weight: 700;
  background: var(--primary-light);
  color: var(--primary);
}
td.status-cell { white-space: nowrap; }
.status-icon { font-size: 0.9rem; }
td.contact { color: #555; font-size: 0.82rem; white-space: nowrap; }

/* Progress */
.progress-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  justify-content: center;
  align-items: center;
}
.progress-overlay.show { display: flex; }
.progress-box {
  background: white;
  border-radius: 14px;
  padding: 2rem;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
.progress-box h3 { margin-bottom: 1rem; color: var(--primary); }
.progress-bar-bg {
  height: 10px;
  background: #e0e0e0;
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: 0.75rem;
}
.progress-bar-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 5px;
  transition: width 0.3s;
}
.progress-text { font-size: 0.88rem; color: #666; }

/* Footer summary */
.summary-bar {
  display: none;
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.75rem;
}
.summary-stats { display: flex; gap: 1.5rem; flex-wrap: wrap; }
.stat { font-size: 0.88rem; }
.stat strong { font-size: 1.1rem; }
.stat.total  strong { color: var(--primary); }
.stat.changed-count strong { color: var(--warning); }
.stat.done   strong { color: var(--success); }
.stat.err    strong { color: var(--danger); }

.spinner {
  display: inline-block;
  width: 1em; height: 1em;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== PREVIEW MODAL ===== */
.preview-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 998;
  justify-content: center; align-items: flex-start;
  padding: 2rem 1rem; overflow-y: auto;
}
.preview-modal.show { display: flex; }
.preview-modal-box {
  background: white; border-radius: 14px;
  max-width: 860px; width: 100%; margin: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.25); overflow: hidden;
}
.modal-header {
  padding: 1.1rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h2 { font-size: 1.05rem; }
.modal-header.blue  { background: linear-gradient(135deg,#0d47a1,#1976d2); color: white; }
.modal-header.orange{ background: linear-gradient(135deg,#e65100,#bf360c); color: white; }
.preview-modal-body { padding: 1.25rem 1.5rem; overflow-x: auto; max-height: 65vh; overflow-y: auto; }
.preview-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.preview-table th {
  background: #e3f2fd; color: var(--primary);
  padding: 0.5rem 0.75rem; text-align: left;
  font-weight: 700; border: 1px solid #cce0f5; white-space: nowrap;
}
.preview-table td { padding: 0.45rem 0.75rem; border: 1px solid #eee; vertical-align: middle; }
.preview-table tr.dup-row td { background: #fff3e0; }
.dup-tag {
  background: var(--warning); color: white;
  font-size: 0.72rem; font-weight: 700;
  padding: 0.1rem 0.4rem; border-radius: 4px; margin-left: 0.4rem;
}
.modal-footer {
  display: flex; justify-content: flex-end; gap: 0.75rem;
  padding: 1rem 1.5rem; border-top: 1px solid #eee; background: #fafafa;
}
.dup-warning-bar {
  background: var(--warning-light); border-left: 4px solid var(--warning);
  color: var(--warning); padding: 0.65rem 1rem; border-radius: 6px;
  font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem; display: none;
}
.dup-warning-bar.show { display: block; }

/* ===== SINGLE EDIT MODAL ===== */
.single-edit-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 999;
  justify-content: center; align-items: center; padding: 1rem;
}
.single-edit-modal.show { display: flex; }
.single-edit-box {
  background: white; border-radius: 14px;
  max-width: 500px; width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.25); overflow: hidden;
}
.single-edit-body { padding: 1.25rem 1.5rem; }
.single-edit-body .field-label { font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 0.3rem; }
.single-edit-body .old-val {
  padding: 0.45rem 0.75rem; background: #f5f5f5;
  border-radius: 6px; font-size: 0.85rem; color: #888; margin-bottom: 0.75rem;
}
.single-edit-body input[type="text"] {
  width: 100%; padding: 0.6rem 0.9rem;
  border: 1.5px solid #ccc; border-radius: 8px;
  font-size: 0.95rem; font-family: var(--font);
}
.single-edit-body input:focus { outline: none; border-color: var(--primary); }
.single-edit-note {
  font-size: 0.8rem; color: var(--warning); margin-top: 0.6rem;
  padding: 0.5rem 0.75rem; background: var(--warning-light); border-radius: 6px;
}
.btn-sm { padding: 0.4rem 0.9rem; font-size: 0.82rem; display: inline-block; min-width: 60px; }
.btn-warning { background: var(--warning); color: white; }
</style>
</head>
<body>

<div class="header">
  <h1>🛠️ 投稿編號管理系統</h1>
  <p>台灣醫事聯合臨床技能發展學會 2026年會員大會暨學術研討會</p>
</div>

<div class="main">

  <!-- 設定區 -->
  <div class="setup-card">
    <h2>⚙️ 連線設定</h2>
    <div class="setup-row">
      <input type="text" id="scriptUrl" placeholder="請貼入 Apps Script 網頁應用程式 URL"
        value="https://script.google.com/macros/s/AKfycbzdppunk_BTiZN2ShWpJilr5FGnCrN4BB6QPD_miImF5pObEZxe3wSAQaj5VuWbnF3m/exec">
      <button class="btn btn-primary" onclick="loadSubmissions()">📥 載入投稿清單</button>
    </div>
  </div>

  <div class="info-bar" id="infoBar"></div>

  <!-- 投稿清單表格 -->
  <div class="table-card" id="tableCard" style="display:none">
    <div class="table-toolbar">
      <h2 id="tableTitle">投稿清單</h2>
      <div class="toolbar-actions">
        <button class="btn btn-warning" onclick="autoRenumber()" id="autoBtn">🔢 自動重新編號</button>
        <button class="btn btn-success" onclick="confirmAndUpdate()" id="updateBtn">🚀 全部更新 PDF＋Sheet</button>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="dot dot-unchanged"></div>未修改</div>
      <div class="legend-item"><div class="dot dot-changed"></div>已修改（待更新）</div>
      <div class="legend-item"><div class="dot dot-error"></div>更新失敗</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>原始編號</th>
            <th>新編號（可直接修改）</th>
            <th>論文題目</th>
            <th>類別</th>
            <th>通訊作者</th>
            <th>狀態</th>
            <th style="min-width:80px;text-align:center">單筆修改</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 統計列 -->
  <div class="summary-bar" id="summaryBar">
    <div class="summary-stats">
      <div class="stat total">總投稿 <strong id="statTotal">0</strong> 筆</div>
      <div class="stat changed-count">已修改 <strong id="statChanged">0</strong> 筆</div>
      <div class="stat done">已完成 <strong id="statDone">0</strong> 筆</div>
      <div class="stat err">失敗 <strong id="statErr">0</strong> 筆</div>
    </div>
    <button class="btn btn-primary" onclick="loadSubmissions()">🔄 重新載入</button>
  </div>

</div>

<!-- 進度視窗 -->
<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <h3>🔄 更新中，請稍候...</h3>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <p class="progress-text" id="progressText">準備中...</p>
  </div>
</div>

<!-- 預覽確認 Modal -->
<div class="preview-modal" id="previewModal">
  <div class="preview-modal-box">
    <div class="modal-header blue">
      <h2>📋 送出前確認：所有編號一覽</h2>
      <button onclick="closePreviewModal()" style="background:none;border:none;color:white;font-size:1.2rem;cursor:pointer">✕</button>
    </div>
    <div class="preview-modal-body">
      <div class="dup-warning-bar" id="dupWarningBar"></div>
      <table class="preview-table" id="previewTable"></table>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closePreviewModal()" style="background:#eee;color:#333">← 返回修改</button>
      <button class="btn btn-success" id="confirmUpdateBtn" onclick="doUpdate()">✅ 確認無誤，全部更新</button>
    </div>
  </div>
</div>

<!-- 單筆修改 Modal -->
<div class="single-edit-modal" id="singleEditModal">
  <div class="single-edit-box">
    <div class="modal-header orange">
      <h2>✏️ 單筆編號修改</h2>
      <button onclick="closeSingleEdit()" style="background:none;border:none;color:white;font-size:1.2rem;cursor:pointer">✕</button>
    </div>
    <div class="single-edit-body">
      <div class="field-label">論文題目</div>
      <div class="old-val" id="seTitle"></div>
      <div class="field-label">目前編號</div>
      <div class="old-val" id="seOldId"></div>
      <div class="field-label">新編號</div>
      <input type="text" id="seNewId" placeholder="請輸入新編號">
      <div class="single-edit-note">
        ⚠️ 單筆修改時，<strong>舊 PDF 不會被刪除</strong>，新 PDF 會另外產生。<br>
        兩份 PDF 都會保留在 Drive 中，Sheet 只更新為新編號。
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeSingleEdit()" style="background:#eee;color:#333">取消</button>
      <button class="btn btn-warning" id="seSaveBtn" onclick="doSingleEdit()">🔄 更新此筆</button>
    </div>
  </div>
</div>

<script>
let submissions = [];
let newIds = {};
let singleEditIndex = -1;

function getUrl() { return document.getElementById('scriptUrl').value.trim(); }

function showInfo(msg, type) {
  const bar = document.getElementById('infoBar');
  bar.textContent = msg;
  bar.className = 'info-bar show ' + (type||'info');
}

// ===== 載入 =====
async function loadSubmissions() {
  const url = getUrl();
  if (!url) { showInfo('請填入 Apps Script URL', 'error'); return; }
  showInfo('⏳ 載入中...', 'info');
  try {
    const resp = await fetch(url + '?action=getSubmissions');
    const json = await resp.json();
    if (json.result !== 'success') throw new Error(json.message);
    submissions = json.data;
    newIds = {};
    renderTable();
    document.getElementById('tableCard').style.display = '';
    document.getElementById('summaryBar').style.display = 'flex';
    showInfo(`✅ 已載入 ${submissions.length} 筆投稿`, 'success');
    updateStats();
  } catch(err) {
    showInfo('❌ 載入失敗：' + err.message, 'error');
  }
}

// ===== 渲染表格 =====
function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  document.getElementById('tableTitle').textContent = `投稿清單（共 ${submissions.length} 筆）`;
  const allNewIds = getAllNewIds();
  const dupSet = findDuplicates(allNewIds);

  submissions.forEach((row, i) => {
    const oldId  = row[0] || '';
    const cat    = row[2] || '';
    const title  = row[3] || '';
    const name   = row[8] || '';
    const curNew = allNewIds[i];
    const isModified = curNew !== oldId;
    const isDup = dupSet.has(curNew) && curNew !== '';

    const tr = document.createElement('tr');
    if (isModified) tr.classList.add('changed');
    if (isDup) tr.style.background = '#fff3e0';
    tr.id = 'row-' + i;

    tr.innerHTML = `
      <td class="seq">${i+1}</td>
      <td class="old-id">${esc(oldId)}</td>
      <td class="new-id-cell">
        <input type="text" value="${esc(curNew)}" id="newid-${i}"
          oninput="onIdChange(${i}, this.value)"
          class="${isModified?'modified':''}${isDup?' dup-input':''}">
        ${isDup ? '<span class="dup-tag">⚠️ 重複</span>' : ''}
      </td>
      <td class="paper-title" title="${esc(title)}">${esc(title)}</td>
      <td class="category"><span class="cat-badge">${esc(cat)}</span></td>
      <td class="contact">${esc(name)}</td>
      <td class="status-cell" id="status-${i}"><span class="status-icon">⬜</span> 待更新</td>
      <td style="text-align:center;min-width:80px;vertical-align:middle"></td>
    `;

    // 單筆按鈕用 DOM 方式建立，避免 template literal 問題
    const editTd = tr.lastElementChild;
    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-warning btn-sm';
    editBtn.textContent = '✏️ 單筆';
    editBtn.addEventListener('click', (function(idx){ return function(){ openSingleEdit(idx); }; })(i));
    editTd.appendChild(editBtn);
    tbody.appendChild(tr);
  });
  updateStats();
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function getAllNewIds() {
  return submissions.map((row, i) => newIds[i] !== undefined ? newIds[i] : (row[0] || ''));
}

function findDuplicates(ids) {
  const count = {};
  ids.forEach(id => { if(id) count[id] = (count[id]||0)+1; });
  return new Set(Object.keys(count).filter(k => count[k] > 1));
}

function onIdChange(i, val) {
  newIds[i] = val.trim();
  const oldId = submissions[i][0] || '';
  const inp = document.getElementById('newid-' + i);
  inp.className = newIds[i] !== oldId ? 'modified' : '';
  const tr = document.getElementById('row-' + i);
  if (newIds[i] !== oldId) tr.classList.add('changed');
  else tr.classList.remove('changed');
  updateStats();
  checkDuplicatesInline();
}

function checkDuplicatesInline() {
  const allIds = getAllNewIds();
  const dupSet = findDuplicates(allIds);
  allIds.forEach((id, i) => {
    const inp = document.getElementById('newid-' + i);
    if (!inp) return;
    if (dupSet.has(id)) {
      inp.style.borderColor = 'var(--warning)';
      inp.style.background = '#fff8e1';
    } else {
      inp.style.borderColor = '';
      inp.style.background = '';
    }
  });
}

// ===== 自動重新編號 =====
function autoRenumber() {
  if (submissions.length === 0) return;
  if (!confirm('將依「類別→投稿時間」順序，對所有投稿重新產生編號，確定繼續？')) return;
  const groups = {};
  submissions.forEach((row, i) => {
    const cat = (row[2] || 'X').replace('類','').trim();
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push({ i, row });
  });
  Object.keys(groups).sort().forEach(cat => {
    groups[cat].sort((a,b) => new Date(a.row[1]||0) - new Date(b.row[1]||0));
    groups[cat].forEach((item, seq) => {
      const seqStr = String(seq+1).padStart(2,'0');
      const unit   = getUnitAbbr(item.row[11]||'');
      const prof   = getProfShort(item.row[14]||'');
      const name   = (item.row[8]||'').replace(/\s/g,'');
      newIds[item.i] = cat+'-'+seqStr+'-'+unit+'-'+prof+'-'+name;
    });
  });
  renderTable();
  showInfo(`✅ 已自動重新編號 ${submissions.length} 筆，請確認後按「全部更新」`, 'success');
}

// ===== 預覽 Modal =====
function confirmAndUpdate() {
  const allIds = getAllNewIds();
  const dupSet = findDuplicates(allIds);
  const changedCount = submissions.filter((row,i) => allIds[i] !== (row[0]||'')).length;
  if (changedCount === 0) { showInfo('⚠️ 沒有任何編號被修改', 'warning'); return; }

  // 建立預覽表格
  const table = document.getElementById('previewTable');
  table.innerHTML = `<thead><tr>
    <th>#</th><th>論文題目</th><th>類別</th><th>通訊作者</th>
    <th>舊編號</th><th>新編號</th>
  </tr></thead>`;
  const tbody = document.createElement('tbody');
  submissions.forEach((row, i) => {
    const oldId = row[0]||'';
    const newId = allIds[i];
    const isDup = dupSet.has(newId);
    const tr = document.createElement('tr');
    if (isDup) tr.classList.add('dup-row');
    tr.innerHTML = `
      <td>${i+1}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(row[3]||'')}">${esc(row[3]||'')}</td>
      <td>${esc(row[2]||'')}</td>
      <td>${esc(row[8]||'')}</td>
      <td style="color:#999;font-size:0.82rem">${esc(oldId)}</td>
      <td style="font-weight:700;color:${isDup?'var(--warning)':'var(--success)'}">${esc(newId)}${isDup?'<span class="dup-tag">⚠️重複</span>':''}</td>
    `;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  // 重複警告
  const warnBar = document.getElementById('dupWarningBar');
  const confirmBtn = document.getElementById('confirmUpdateBtn');
  if (dupSet.size > 0) {
    warnBar.textContent = `⚠️ 發現 ${dupSet.size} 個重複編號（橘色列），請返回修改後再送出`;
    warnBar.classList.add('show');
    confirmBtn.disabled = true;
    confirmBtn.title = '請先修正重複編號';
  } else {
    warnBar.classList.remove('show');
    confirmBtn.disabled = false;
    confirmBtn.title = '';
  }

  document.getElementById('previewModal').classList.add('show');
}

function closePreviewModal() {
  document.getElementById('previewModal').classList.remove('show');
}

// ===== 執行全部更新 =====
async function doUpdate() {
  closePreviewModal();
  const allIds = getAllNewIds();
  const updateList = submissions.map((row,i) => ({
    rowIndex: i+2, oldId: row[0]||'', newId: allIds[i],
    data: {
      category: row[2]||'', paperTitle: row[3]||'', keywords: row[4]||'',
      authors: row[5]||'', absMotivation: row[15]||'', absMethod: row[16]||'',
      absResult: row[17]||'', absConclusion: row[18]||'', wordCount: row[19]||'',
      status: row[23]||'待審查',
    }
  }));

  const overlay  = document.getElementById('progressOverlay');
  const fill     = document.getElementById('progressFill');
  const progText = document.getElementById('progressText');
  overlay.classList.add('show');

  let done=0, err=0;
  for (const item of updateList) {
    progText.textContent = `處理中 ${done+err+1} / ${updateList.length}：${item.newId}`;
    fill.style.width = ((done+err)/updateList.length*100)+'%';
    setRowStatus(item.rowIndex-2, '⏳', '更新中...');
    try {
      const body = new URLSearchParams();
      body.append('action','renumberSubmission');
      body.append('rowIndex', item.rowIndex);
      body.append('oldId', item.oldId);
      body.append('newId', item.newId);
      body.append('data', JSON.stringify(item.data));
      body.append('keepOld', 'false');
      const resp = await fetch(getUrl(), { method:'POST', body, headers:{'Content-Type':'application/x-www-form-urlencoded'} });
      const json = await resp.json();
      if (json.result==='success') {
        done++;
        setRowStatus(item.rowIndex-2,'✅','完成');
        submissions[item.rowIndex-2][0] = item.newId;
        if (json.newPdfUrl) submissions[item.rowIndex-2][22] = json.newPdfUrl;
      } else throw new Error(json.message);
    } catch(e) {
      err++;
      setRowStatus(item.rowIndex-2,'❌','失敗：'+e.message);
      document.getElementById('row-'+(item.rowIndex-2)).classList.add('error-row');
    }
  }
  fill.style.width='100%';
  progText.textContent=`完成！成功 ${done} 筆，失敗 ${err} 筆`;
  setTimeout(() => {
    overlay.classList.remove('show');
    newIds={};
    renderTable();
    updateStats();
    if (err===0) showInfo(`🎉 全部 ${done} 筆更新完成！`,'success');
    else showInfo(`⚠️ ${done} 筆成功，${err} 筆失敗，請查看紅色列`,'warning');
  }, 1500);
}

// ===== 單筆修改 =====
function openSingleEdit(i) {
  singleEditIndex = i;
  const row = submissions[i];
  document.getElementById('seTitle').textContent = row[3] || '（無題目）';
  document.getElementById('seOldId').textContent = row[0] || '（無編號）';
  document.getElementById('seNewId').value = newIds[i] !== undefined ? newIds[i] : (row[0]||'');

  document.getElementById('seSaveBtn').textContent = '🔄 更新此筆';
  document.getElementById('singleEditModal').classList.add('show');
}
function closeSingleEdit() {
  document.getElementById('singleEditModal').classList.remove('show');
  singleEditIndex = -1;
}
async function doSingleEdit() {
  const i = singleEditIndex;
  if (i < 0) return;
  const newId = document.getElementById('seNewId').value.trim();
  if (!newId) { alert('請填入新編號'); return; }
  const row = submissions[i];
  const oldId = row[0] || '';
  if (newId === oldId) { closeSingleEdit(); return; }

  // 確認視窗
  if (!confirm(`確定要修改第 ${i+1} 筆編號嗎？\n\n舊編號：${oldId}\n新編號：${newId}\n\n⚠️ 舊 PDF 將保留，新 PDF 另外產生。`)) return;

  const saveBtn = document.getElementById('seSaveBtn');
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<span class="spinner"></span> 更新中...';

  try {
    const body = new URLSearchParams();
    body.append('action', 'renumberSubmission');
    body.append('rowIndex', i + 2);
    body.append('oldId', oldId);
    body.append('newId', newId);
    body.append('keepOld', 'true');
    body.append('data', JSON.stringify({
      category:      row[2]  || '',
      paperTitle:    row[3]  || '',
      keywords:      row[4]  || '',
      authors:       row[5]  || '',
      absMotivation: row[15] || '',
      absMethod:     row[16] || '',
      absResult:     row[17] || '',
      absConclusion: row[18] || '',
      wordCount:     row[19] || '',
      status:        row[23] || '待審查',
    }));
    const resp = await fetch(getUrl(), { method: 'POST', body, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
    const json = await resp.json();
    if (json.result !== 'success') throw new Error(json.message);

    // 只更新這一筆
    submissions[i][0] = newId;
    if (json.newPdfUrl) submissions[i][22] = json.newPdfUrl;
    newIds[i] = newId;
    closeSingleEdit();
    renderTable();
    updateStats();
    setRowStatus(i, '✅', '已更新');
    showInfo(`✅ 第 ${i+1} 筆已更新為「${newId}」（舊 PDF 保留）`, 'success');
  } catch(e) {
    saveBtn.disabled = false;
    saveBtn.innerHTML = '🔄 更新此筆';
    alert('❌ 更新失敗：' + e.message);
  }
}

function setRowStatus(i, icon, text) {
  const cell = document.getElementById('status-'+i);

}

function updateStats() {
  const allIds = getAllNewIds();

// ===== 單位/職類縮寫 =====
function getUnitAbbr(unit) {
  if (!unit) return '未知';
  const map = {'亞東':'亞東','奇美':'奇美','台大':'台大','臺大':'台大','長庚':'長庚','馬偕':'馬偕','成大':'成大','高醫':'高醫','中山':'中山','榮總':'榮總','北榮':'北榮','中榮':'中榮','高榮':'高榮','屏基':'屏基','彰基':'彰基','嘉基':'嘉基','慈濟':'慈濟','新光':'新光','國泰':'國泰','萬芳':'萬芳','輔大':'輔大','陽明':'陽明','北醫':'北醫','中國醫':'中醫'};

  for (const k in map) { if (prof.indexOf(k)!==-1) return map[k]; }
  return prof.substring(0,2);
}


function getUrl() {
  return document.getElementById('scriptUrl').value.trim();
}

function showInfo(msg, type) {

// ===== 載入投稿清單 =====
async function loadSubmissions() {
  const url = getUrl();
  if (!url) { showInfo('請填入 Apps Script URL', 'error'); return; }

  showInfo('⏳ 載入中...', 'info');
  try {
    const resp = await fetch(url + '?action=getSubmissions');
    const json = await resp.json();
    if (json.result !== 'success') throw new Error(json.message);

    submissions = json.data;
    newIds = {};
    renderTable();
    document.getElementById('tableCard').style.display = '';
    document.getElementById('summaryBar').style.display = 'flex';
    showInfo(`✅ 已載入 ${submissions.length} 筆投稿`, 'success');

    showInfo('❌ 載入失敗：' + err.message, 'error');

// ===== 渲染表格 =====
function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  document.getElementById('tableTitle').textContent = `投稿清單（共 ${submissions.length} 筆）`;

  submissions.forEach((row, i) => {
    const oldId  = row[0] || '';   // A欄
    const ts     = row[1] || '';   // B欄
    const cat    = row[2] || '';   // C欄
    const title  = row[3] || '';   // D欄
    const name   = row[8] || '';   // I欄 通訊作者
    const curNew = newIds[i] !== undefined ? newIds[i] : oldId;
    const isModified = curNew !== oldId;

    const tr = document.createElement('tr');
    if (isModified) tr.classList.add('changed');
    tr.id = 'row-' + i;

    tr.innerHTML = `
      <td class="seq">${i+1}</td>
      <td class="old-id">${esc(oldId)}</td>
      <td class="new-id-cell">
        <input type="text" value="${esc(curNew)}" id="newid-${i}"
          oninput="onIdChange(${i}, this.value)"
          class="${isModified?'modified':''}">
      </td>
      <td class="paper-title" title="${esc(title)}">${esc(title)}</td>
      <td class="category"><span class="cat-badge">${esc(cat)}</span></td>
      <td class="contact">${esc(name)}</td>
      <td class="status-cell" id="status-${i}"><span class="status-icon">⬜</span> 待更新</td>
    `;
    tbody.appendChild(tr);
  });
  updateStats();
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function onIdChange(i, val) {
  newIds[i] = val.trim();
  const inp = document.getElementById('newid-' + i);
  const oldId = submissions[i][0] || '';
  const isModified = newIds[i] !== oldId;
  inp.className = isModified ? 'modified' : '';
  const tr = document.getElementById('row-' + i);
  if (isModified) tr.classList.add('changed');
  else tr.classList.remove('changed');
  updateStats();
}

// ===== 自動重新編號 =====
function autoRenumber() {
  if (submissions.length === 0) return;
  if (!confirm('將依「類別→投稿時間」順序，對所有投稿重新產生編號，確定繼續？')) return;

  // 依類別分組，同類別內依投稿時間排序
  const groups = {};
  submissions.forEach((row, i) => {
    const cat = (row[2] || 'X').replace('類','').trim();
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push({ i, row });
  });

  // 類別排序
  const sortedCats = Object.keys(groups).sort();
  sortedCats.forEach(cat => {
    groups[cat].sort((a, b) => {
      const ta = new Date(a.row[1] || 0).getTime();
      const tb = new Date(b.row[1] || 0).getTime();
      return ta - tb;
    });
    groups[cat].forEach((item, seq) => {
      const seqStr   = String(seq + 1).padStart(2, '0');
      const unit     = getUnitAbbr(item.row[11] || '');  // L欄=服務單位
      const prof     = getProfShort(item.row[14] || ''); // O欄=職類
      const name     = (item.row[8] || '').replace(/\s/g,''); // I欄=姓名
      newIds[item.i] = cat + '-' + seqStr + '-' + unit + '-' + prof + '-' + name;
    });
  });

  renderTable();
  showInfo(`✅ 已自動重新編號 ${submissions.length} 筆，請確認後按「全部更新」`, 'success');
}

      if (json.result === 'success') {
        done++;
        setRowStatus(item.rowIndex - 2, '✅', '完成');
